(function () {
  // ---------- Elements ----------
  const startScreen = document.getElementById('start');
  const game     = document.getElementById('game');
  const promptEl  = document.getElementById('prompt');
  const targetEl  = document.getElementById('target');
  const scoreEl   = document.getElementById('score');
  const exitBtn   = document.getElementById('exit');
  const soundBtn  = document.getElementById('sound');
  const hintEl    = document.getElementById('hint');
  const flashEl   = document.getElementById('flash');
  const nameInput = document.getElementById('nameInput');
  const choicesEl = document.getElementById('choices');
  const buddyEl   = document.getElementById('buddy');
  const starbarEl = document.getElementById('starbar');
  const keyboardEl= document.getElementById('keyboard');
  const fbGoodEl  = document.getElementById('fbGood');
  const fbBadEl   = document.getElementById('fbBad');
  const reactionVid = document.getElementById('reactionVid');

  // Reaction video segments: [start, end] seconds within reactions.mp4
  const REACT = { good: [0.2, 1.9], bad: [2.4, 4.0] };
  let reactionTimer = null;
  const reactionBox = document.getElementById('reactionBox');
  const reactionCaption = document.getElementById('reactionCaption');
  const mfb = document.getElementById('mfb');
  function mfbHint() { if (mfb) { mfb.className = ''; mfb.innerHTML = '<b class="hintline">' +
    (LANG_MODES.includes(mode) ? 'Listen, then tap your answer! 👂' : 'Look closely and find the key!') + '</b>'; } }
  function playReaction(ok) {
    if (mfb) {
      mfb.className = 'show ' + (ok ? 'good' : 'bad');
      mfb.innerHTML = ok ? '<b>Great job!</b><span>You found it!</span>'
                         : "<b>Oops!</b><span>Let's try that again!</span>";
    }
    if (!reactionVid || !reactionBox) return;
    if (reactionCaption) reactionCaption.textContent = ok ? 'Great job!' : "Oops! Let's try that again!";
    const seg = ok ? REACT.good : REACT.bad;
    try { reactionVid.currentTime = seg[0]; } catch (e) {}
    reactionVid.muted = true;                  // silent — Yako's voice does the talking
    reactionBox.classList.add('show');
    reactionVid.play().catch(() => {});
    clearTimeout(reactionTimer);
    reactionTimer = setTimeout(() => {
      reactionVid.pause();
      reactionBox.classList.remove('show');
    }, (seg[1] - seg[0]) * 1000);
  }
  function hideReaction() { clearTimeout(reactionTimer); if (reactionVid) reactionVid.pause(); if (reactionBox) reactionBox.classList.remove('show'); }
  const winEl     = document.getElementById('win');
  const yakoEl    = document.getElementById('yako');
  const freeLetterEl = document.getElementById('freeLetter');

  let freeKeyCount = 0;

  // Use the real Yako artwork if present; otherwise fall back to an emoji.
  function makeImg(src, cls, emoji) {
    const img = document.createElement('img');
    img.className = cls; img.src = src; img.alt = 'Yako';
    img.onerror = () => { const s = document.createElement('span'); s.className = cls; s.textContent = emoji || '👦'; img.replaceWith(s); };
    return img;
  }
  function makeYako(cls, emoji) { return makeImg('yako.png', cls, emoji || '👦🐕'); }
  function fillYako(el, cls, emoji) { if (!el) return; el.innerHTML = ''; el.appendChild(makeYako(cls, emoji)); }

  const colors = ['#FF3B30','#FF9500','#FFCC00','#34C759','#00C7BE',
                  '#30B0C7','#007AFF','#5856D6','#AF52DE','#FF2D55'];
  const pick = a => a[Math.floor(Math.random() * a.length)];

  // ---------- Lessons (campaign order: easiest → hardest) ----------
  const LESSONS = [
    ['numbers',  'Numbers'],
    ['letters',  'Letters'],
    ['both',     'Letters & Numbers'],
    ['shapes',   'Shapes'],
    ['colors',   'Colors'],
    ['animals',  'Animals'],
    ['sounds',   'Letter Sounds'],
    ['listen',   'Listen & Find'],
    ['earmatch', 'Listen & Match'],
    ['countobj', 'How Many?'],
    ['spelling', 'Spelling'],
    ['counting', 'Counting'],
    ['math',     'Add & Subtract'],
    // ----- Music: hear a pitch, match the note; build chords (synth tones) -----
    ['pitchtrain',  'Pitch Training'],
    ['pitchlisten', 'Listen & Match'],
    ['chords',      'Chords'],
    // ----- Language Island: teach a new language by ear (tap-to-answer, no keyboard) -----
    ['hello',      'Hello Around the World'],
    ['wordsafari', 'Word Safari'],
    ['colormix',   'Color Words'],
    ['countlang',  'Number Words'],
    ['guesslang',  'Guess the Language'],

  const LANG_MODES = ['hello', 'wordsafari', 'colormix', 'countlang', 'guesslang', 'samediff'];
  const lessonIdx  = m => LESSONS.findIndex(l => l[0] === m);
  const lessonName = m => { const l = LESSONS[lessonIdx(m)]; return l ? l[1] : m; };

  // ---------- State ----------
  let mode = 'letters';

  let locked = false;
  let roundTimer = null;
  let lastTarget = null;

  // level / scoring / timing
  const STARS_PER_LEVEL = 5;

  let levelElapsed = 0;

  let hintTimer = null, hintStage = 0;   // 0 = hidden, 1 = 9-key cluster, 2 = exact key revealed
  const HINT_DELAYS = { cluster: 5000, exact: 4000 };   // idle ms before each help stage

  // ---------- localStorage helpers ----------
  function getNum(k) { try { const v = localStorage.getItem(k); return v == null ? null : parseFloat(v); } catch (e) { return null; } }
  function setNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }
  function fmt(sec) { return (Math.round(sec * 10) / 10).toFixed(1); }

  // ---------- Modules (js/i18n.js + js/audio.js) ----------
  // Local aliases so the game code below keeps its familiar names.
  const I = window.YAKO.i18n, A = window.YAKO.audio;
  const L = I.L, langPrefix = I.langPrefix,
        locName = I.locName, locLetter = I.locLetter, locCreat = I.locCreat, phonFor = I.phonFor;
  const ensureAudio = A.ensureAudio, stopAllSounds = A.stopAllSounds,
        playApplause = A.playApplause, playChime = A.playChime,
        playTryAgainTone = A.playTryAgainTone, playNote = A.playNote, playTone = A.playTone,
        startBarkLoop = A.startBarkLoop, stopBarkLoop = A.stopBarkLoop,
        speak = A.speak, speakName = A.speakName, say = A.say, playPersona = A.playPersona,

        chClip = A.chClip, isNum = A.isNum, nextCheer = A.nextCheer, pickVoice = A.pickVoice;

  // ---------- Challenge data ----------
  const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const NUMBERS = "0123456789".split("");
  const COLORS_DATA = [
    {name:'Red',    letter:'R', hex:'#FF3B30'},

    {name:'Yellow', letter:'Y', hex:'#FFCC00'},

  // Spelling words + their pictures live in data/lessons.js (shared with tools/)
  const WORDS = window.YAKO_LESSONS.WORDS;
  const WORD_EMOJI = window.YAKO_LESSONS.WORD_EMOJI;
  // difficulty grows every 3 levels
  function spellLenForLevel() { return Math.min(3 + Math.floor((level - 1) / 3), 6); }
  function countLenForLevel() { return Math.min(2 + Math.floor((level - 1) / 3), 5); }

  let challenge = null;

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function pickDistinct(data, target, n) {
    const others = shuffle(data.filter(d => d.name !== target.name)).slice(0, n - 1);
    return shuffle(others.concat([target]));
  }
  function picHTML(item, kind) {
    return kind === 'color'
      ? '<div class="swatch" style="background:' + item.hex + '"></div>'
      : '<span class="glyph">' + item.glyph + '</span>';
  }
  // Break a prompt onto two balanced lines (split at the space nearest the middle);
  // works in any language, and HTML-escapes the text first.
  function twoLine(s) {
    const esc = String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    const parts = esc.split(' ');
    if (parts.length < 2) return esc;
    const mid = esc.length / 2;
    let best = 0, bestD = Infinity, run = 0;
    for (let i = 0; i < parts.length - 1; i++) {
      run += parts[i].length + 1;
      const d = Math.abs(run - mid);
      if (d < bestD) { bestD = d; best = i; }
    }
    return parts.slice(0, best + 1).join(' ') + '<br>' + parts.slice(best + 1).join(' ');
  }
  function renderItemWithLetter(item, kind, letter) {
    // Just the letter to find, big and clear (the picture clue was removed for a cleaner card).
    letter = letter || item.letter;
    targetEl.style.color = '';
    targetEl.innerHTML =
      '<div class="itemCol">' +
      '<span class="bigletter" style="color:' + (kind === 'color' ? item.hex : 'var(--blue)') + '">' + letter + '</span>' +
      '</div>';
  }
  function renderChoices(opts, kind) {
    game.classList.add('choices-mode');
    choicesEl.innerHTML = '';
    opts.forEach(o => {
      const div = document.createElement('div');
      div.className = 'choice';
      div.dataset.number = o.number;
      div.innerHTML = '<div class="num">' + o.number + '</div>' +
                      picHTML(o.item, kind) + '<div class="nm">' + o.item.name + '</div>';
      div.addEventListener('click', () => tryAnswer(String(o.number)));
      choicesEl.appendChild(div);
    });
  }
  function highlightChoice(num, ok) {
    const el = choicesEl.querySelector('.choice[data-number="' + num + '"]');
    if (el) el.classList.add(ok ? 'correct' : 'wrong');
  }

  function categoryChallenge(data, kind) {
    const item = pick(data);
    const lname = locName(item.name), lletter = locLetter(item.name);
    if (answerStyle === 'number') {
      const opts = pickDistinct(data, item, 3).map((it, i) => ({ item: it, number: i + 1 }));
      const right = opts.find(o => o.item.name === item.name);
      return { answer: String(right.number), kind, name: lname, style: 'number', choices: opts,
        render() { targetEl.style.color = ''; targetEl.innerHTML = picHTML(item, kind); renderChoices(opts, kind); },
        revealAnswer() {} };
    }
    return { answer: lletter, kind, name: lname, style: 'letter', itemKey: item.name.toLowerCase(),
      render() { renderItemWithLetter(item, kind, lletter); },
      revealAnswer() {
        const bl = targetEl.querySelector('.bigletter');
        if (bl) { bl.textContent = lletter; bl.classList.remove('answerSlot');
          bl.style.color = (kind === 'color' ? item.hex : 'var(--blue)'); }
      } };
  }
  // ----- Sequence games (Spelling / Counting): find each letter/digit in order -----
  function renderSeqCard(seq, revealed, pic) {
    targetEl.style.color = '';
    targetEl.innerHTML = '<div class="itemCol"><div class="spellRow">' + seq.map((ch, i) => {
      const cls = i < revealed ? 'sl done' : (i === revealed ? 'sl now' : 'sl');
      return '<span class="' + cls + '">' + ch + '</span>';
    }).join('') + '</div>' +
    (pic ? '<div class="spellPic">' + pic + '</div>' : '') + '</div>';   // the thing being spelled, under the word
  }
  function seqChallenge(word, kind) {
    const seq = word.split('');
    const pic = kind === 'letter' ? (WORD_EMOJI[word] || '') : '';
    return {
      style: 'seq', word: word, seq: seq, idx: 0, answer: seq[0], kind: kind, name: word, pic: pic,
      render() { renderSeqCard(this.seq, this.idx, this.pic); },
      revealAll() { renderSeqCard(this.seq, this.seq.length, this.pic); }
    };
  }
  function buildSpell() { return seqChallenge(pick(WORDS[spellLenForLevel()] || WORDS[3]), 'letter'); }
  function buildCount() {
    const len = countLenForLevel();
    let s = String(1 + Math.floor(Math.random() * 9));            // first digit 1-9
    for (let i = 1; i < len; i++) s += String(Math.floor(Math.random() * 10));
    return seqChallenge(s, 'number');
  }

  // ----- Letter Sounds (phonics): letter + its sound + a keyword picture -----
  function buildSounds() {
    const Lr = pick(LETTERS); const pf = phonFor(Lr);   // [word, emoji, (sound for en)]
    const word = pf[0], emoji = pf[1], snd = pf[2] || '';
    const connector = langPrefix() === 'fr' ? ' comme ' : (langPrefix() === 'es' ? ' — ' : ' is for ');
    return { answer: Lr, kind: 'letter', name: 'snd_' + Lr, style: 'sound', sound: snd, word: word, emoji: emoji,
      render() { targetEl.style.color = '';
        targetEl.innerHTML = '<div class="phonCol"><span class="phonLetter">' + Lr + '</span>' +
          '<span class="phonPic">' + emoji + '</span>' +
          '<div class="phonWord">' + Lr + connector + word + '</div></div>'; },
      revealAnswer() {} };
  }
  // ----- Listen & Find: the child only HEARS the letter (plus a picture clue) -----
  function buildListen() {
    const Lr = pick(LETTERS); const pf = phonFor(Lr);
    const word = pf[0], emoji = pf[1], snd = pf[2] || '';
    return { answer: Lr, kind: 'letter', name: 'lsn_' + Lr, style: 'listen', sound: snd, word: word, emoji: emoji,
      render() { targetEl.style.color = '';
        targetEl.innerHTML = '<div class="phonCol"><span class="phonPic listenPic">' + emoji + '</span></div>'; },
      revealAnswer() {   // hint stage 2: reveal the letter above the picture
        targetEl.innerHTML = '<div class="phonCol"><span class="phonLetter">' + Lr + '</span>' +
          '<span class="phonPic">' + emoji + '</span></div>';
      } };
  }
  // ----- Listen & Match: hear a letter/number that is NEVER shown; match it on the
  //       keyboard by ear. The prompt repeats up to 5×, 3s apart, and only reveals
  //       the answer on the 5th repeat OR after 2 wrong guesses. -----
  let earTimer = null, earCount = 0, targetWrong = 0;
  function clearEar() { clearTimeout(earTimer); earTimer = null; }
  function buildEarMatch() {
    const ch = pick(LETTERS.concat(NUMBERS));
    const isN = /[0-9]/.test(ch);
    function speakFind() { playPersona(isN ? 'find_num_' + ch : 'find_let_' + ch, L().find(ch), { rate: 0.92 }); }
    return {
      answer: ch, kind: isN ? 'number' : 'letter', name: 'ear_' + ch, style: 'earmatch',
      render() {
        targetEl.style.color = '';
        targetEl.innerHTML = '<div class="phonCol"><span class="phonPic listenPic">👂</span>' +
          '<button type="button" class="speakerBtn" aria-label="Hear it again">🔊</button></div>';
        const sb = targetEl.querySelector('.speakerBtn');
        if (sb) sb.addEventListener('click', e => { e.stopPropagation(); speakFind(); });
      },
      // announce() calls play() first: say it, then repeat every 3s (up to 5), revealing on the 5th
      play() {
        clearEar();
        earCount = 1; speakFind();
        const tick = () => {
          earCount++; speakFind();
          if (earCount >= 5) this.revealAnswer();       // 5th time → finally show it
          else earTimer = setTimeout(tick, 3000);
        };
        earTimer = setTimeout(tick, 3000);
      },
      revealAnswer() {
        clearEar();
        targetEl.innerHTML = '<div class="phonCol"><span class="bigletter" style="color:var(--blue)">' + ch + '</span></div>';
      }
    };
  }
  // ----- How Many? (count the sea creatures) and Add & Subtract -----
  const SEA = [['🐚','shells'],['🦀','crabs'],['⭐','starfish'],['🐟','fish'],['🐙','octopuses'],['🐬','dolphins']];
  function objs(emoji, n) { let s = ''; for (let i = 0; i < n; i++) s += '<span class="cobj">' + emoji + '</span>'; return s; }
  // How Many? grows gently: at most 4 objects at first, then 6, then 9 — the cap
  // rises only after a level is cleared quickly and with few mistakes (see completeLevel).
  function countMax() { const t = getNum('yako_count_tier'); return (t === 6 || t === 9) ? t : 4; }
  function buildCountObjects() {
    const n = 1 + Math.floor(Math.random() * countMax());   // 1..(4|6|9)
    const c = pick(SEA);
    return { answer: String(n), kind: 'number', name: 'cnt_' + n + c[1], style: 'count', creatures: c[1],
      render() { targetEl.style.color = ''; targetEl.innerHTML = '<div class="countObjRow">' + objs(c[0], n) + '</div>'; },
      revealAnswer() {} };
  }
  function buildMath() {
    const c = pick(SEA), e = c[0]; let a, b, res, op;
    if (Math.random() < 0.5) {                        // addition, sum <= 9
      a = 1 + Math.floor(Math.random() * 8); b = 1 + Math.floor(Math.random() * (9 - a)); res = a + b; op = '+';
    } else {                                          // subtraction, result >= 1
      a = 2 + Math.floor(Math.random() * 8); b = 1 + Math.floor(Math.random() * (a - 1)); res = a - b; op = '−';
    }
    return { answer: String(res), kind: 'number', name: 'math_' + a + op + b, style: 'math',
      a: a, b: b, op: op, creature: c[1],
      render() { targetEl.style.color = '';
        targetEl.innerHTML = '<div class="mathRow"><span class="grp">' + objs(e, a) + '</span>' +
          '<span class="mop">' + op + '</span><span class="grp">' + objs(e, b) + '</span>' +
          '<span class="meq">=</span><span class="mq">?</span></div>'; },
      revealAnswer() { const q = targetEl.querySelector('.mq'); if (q) { q.textContent = res; q.style.color = '#2bb673'; } } };
  }

  // ================= Language Island (tap-to-answer, learn a tongue by ear) =================
  const VOCAB  = window.YAKO_VOCAB;
  const LANGS  = VOCAB.LANGS;
  // local Monterey animals join the vocabulary (distinct glyphs so Word Safari choices differ)
  const LOCAL_ANIMALS_DATA = [
    { name: 'Seal', glyph: '🦭' }, { name: 'Otter', glyph: '🦦' }, { name: 'Whale', glyph: '🐋' },
    { name: 'Deer', glyph: '🦌' }, { name: 'Quail', glyph: '🐤' }, { name: 'Squirrel', glyph: '🐿️' },
    { name: 'Pelican', glyph: '🦆' }, { name: 'Sheep', glyph: '🐑' }, { name: 'Cow', glyph: '🐮' },
    { name: 'Bird', glyph: '🐦' }, { name: 'Fish', glyph: '🐟' }
  ];
  const ALL_ANIMALS = ANIMALS_DATA.concat(LOCAL_ANIMALS_DATA);
  const CATALL = ALL_ANIMALS.concat(COLORS_DATA, SHAPES_DATA);   // every pictured object
  function wordFor(name, p) { const w = VOCAB.WORDS[name]; return w ? (w[p] || w.en) : name; }
  function numFor(n, p)     { const w = VOCAB.NUMS[n];     return w ? (w[p] || w.en) : String(n); }
  function picHTMLItem(it)  { return it.hex ? '<div class="swatch" style="background:' + it.hex + '"></div>'
                                            : '<span class="glyph">' + it.glyph + '</span>'; }
  // A row of tappable numbered cards; each opt = { number, html }.
  function renderPickChoices(opts) {
    game.classList.add('choices-mode');
    choicesEl.innerHTML = '';
    opts.forEach(o => {
      const div = document.createElement('div');
      div.className = 'choice'; div.dataset.number = o.number;
      div.innerHTML = '<div class="num">' + o.number + '</div>' + o.html;
      div.addEventListener('click', () => tryAnswer(String(o.number)));
      choicesEl.appendChild(div);
    });
  }
  // The listening target: an optional picture + a big speaker the child taps to hear it again.
  function renderSpeakerTarget(objHTML) {
    targetEl.style.color = '';
    targetEl.innerHTML = '<div class="listenCol">' +
      (objHTML ? '<div class="listenObj">' + objHTML + '</div>' : '') +
      '<button type="button" class="speakerBtn" aria-label="Hear it again">🔊</button></div>';
    const sb = targetEl.querySelector('.speakerBtn');
    if (sb) sb.addEventListener('click', e => { e.stopPropagation(); if (challenge && challenge.play) challenge.play(); });
  }
  // how many choices this level shows (grows with the level)
  function langChoiceCount(max) { return Math.min(2 + Math.floor((level - 1) / 2), max); }
  function activeLangs() { return shuffle(LANGS.slice()).slice(0, langChoiceCount(5)); }

  // Hello Around the World (greeting→flag) and Guess the Language (word→flag)
  function buildLangPick(useGreeting) {
    const langs = activeLangs();
    const target = pick(langs);
    let obj = null, key, fallback;
    if (useGreeting) { key = 'hello'; fallback = VOCAB.HELLO[target.p] || ''; }
    else { obj = pick(CATALL); key = 'word_' + obj.name.toLowerCase(); fallback = wordFor(obj.name, target.p); }
    const opts = shuffle(langs.slice()).map((l, i) => ({ lang: l, number: i + 1 }));
    const right = opts.find(o => o.lang.p === target.p);
    return {
      answer: String(right.number), kind: 'lang', style: 'langpick', choices: opts,
      name: 'lp_' + target.p + '_' + (obj ? obj.name : 'hi'),
      render() {
        renderSpeakerTarget(useGreeting ? '<span class="bigGlobe">🌍</span>' : picHTMLItem(obj));
        renderPickChoices(opts.map(o => ({ number: o.number,
          html: '<span class="flagBig">' + o.lang.flag + '</span><div class="nm">' + o.lang.label + '</div>' })));
      },
      play() { playPersonaLang(target.p, key, fallback, { rate: 0.95 }); },
      revealAnswer() {}
    };
  }
  // Word Safari / Color Words: hear a word in the CURRENT language, tap the matching picture
  function buildWordPick(pool) {
    const item = pick(pool);
    const opts = pickDistinct(pool, item, langChoiceCount(4)).map((it, i) => ({ item: it, number: i + 1 }));
    const right = opts.find(o => o.item.name === item.name);
    const key = 'word_' + item.name.toLowerCase();
    return {
      answer: String(right.number), kind: 'pic', style: 'wordpick', choices: opts, name: 'wp_' + item.name,
      render() {
        renderSpeakerTarget('<span class="bigEar">👂</span>');
        renderPickChoices(opts.map(o => ({ number: o.number,
          html: picHTMLItem(o.item) + '<div class="nm">' + wordFor(o.item.name, langPrefix()) + '</div>' })));
      },
      play() { playPersonaLang(langPrefix(), key, wordFor(item.name, langPrefix()), { rate: 0.95 }); },
      revealAnswer() {}
    };
  }
  // Number Words: hear a number in the current language, tap the group with that many
  function buildCountLang() {
    const n = 1 + Math.floor(Math.random() * 9);
    const c = pick(SEA);
    const wrongs = shuffle([1,2,3,4,5,6,7,8,9].filter(d => d !== n)).slice(0, 2);
    const opts = shuffle([n].concat(wrongs)).map((k, i) => ({ k: k, number: i + 1 }));
    const right = opts.find(o => o.k === n);
    return {
      answer: String(right.number), kind: 'number', style: 'countlang', choices: opts, name: 'cl_' + n + c[1],
      render() {
        renderSpeakerTarget('<span class="bigCount">🔢</span>');
        renderPickChoices(opts.map(o => ({ number: o.number, html: '<div class="clusterChoice">' + objs(c[0], o.k) + '</div>' })));
      },
      play() { playPersonaLang(langPrefix(), 'numword_' + n, numFor(n, langPrefix()), { rate: 0.95 }); },
      revealAnswer() {}
    };
  }
  // Same or Different?: hear two words; is it the same language or two different ones?
  function buildSameDiff() {
    const same = Math.random() < 0.5;
    const lA = pick(LANGS);
    const lB = same ? lA : pick(LANGS.filter(l => l.p !== lA.p));
    const objA = pick(CATALL);
    let objB = pick(CATALL), g = 0; while (objB.name === objA.name && g++ < 6) objB = pick(CATALL);
    return {
      answer: same ? '1' : '2', kind: 'lang', style: 'samediff', choices: [{ number: 1 }, { number: 2 }],
      name: 'sd_' + lA.p + lB.p + objA.name,
      render() {
        renderSpeakerTarget('<span class="bigEar">👂</span>');
        renderPickChoices([
          { number: 1, html: '<span class="sdBig">🟰</span><div class="nm">Same</div>' },
          { number: 2, html: '<span class="sdBig">↔️</span><div class="nm">Different</div>' }]);
      },
      play() {
        A.playPersonaLangChain([
          { lang: lA.p, key: 'word_' + objA.name.toLowerCase(), fallback: wordFor(objA.name, lA.p) },
          { lang: lB.p, key: 'word_' + objB.name.toLowerCase(), fallback: wordFor(objB.name, lB.p) }], { rate: 0.95 });
      },
      revealAnswer() {}
    };
  }

  // ================= Monterey Adventures: count local animals around the peninsula =================
  const MONT = window.YAKO_MONTEREY;
  const SCENE_V = 2;   // bump when scene .mp4s are regenerated, to bust the cache-first media cache
  function setSceneBg(scene) {   // scene = 'scenes/<id>.png'; the living loop is the matching .mp4
    const el = document.getElementById('sceneBg'); if (!el) return;
    const mp4 = scene.replace(/\.png$/, '.mp4') + '?v=' + SCENE_V;
    if (el.getAttribute('src') === mp4) return;             // already showing this place
    el.poster = scene;                                      // painted still shows instantly / video fallback
    el.src = mp4;
    try { el.load(); } catch (e) {}
    el.play().catch(() => {});
  }
  // Every lesson is set in a Monterey place; the backdrop moves to a new area as levels
  // advance — and tapping the place pill lets the child travel anywhere on the peninsula.
  let curPlaceIdx = 0;
  function showPlace(i) {
    curPlaceIdx = ((i % MONT.PLACES.length) + MONT.PLACES.length) % MONT.PLACES.length;
    const place = MONT.PLACES[curPlaceIdx];
    setSceneBg(place.scene);
    const tag = document.getElementById('placeTag');
    if (tag) tag.innerHTML = '<span class="ptTop"><span class="plName">' + place.name + '</span><span class="chev">▾</span></span>' +
                             '<img class="pThumb" src="' + place.scene + '" alt="">';
    document.querySelectorAll('#placePop button').forEach((b, j) => b.classList.toggle('sel', j === curPlaceIdx));
  }
  function setLevelScene() {
    if (mode === 'free') return;
    if (MUSIC_MODES.indexOf(mode) >= 0) {                 // Music lessons are always at Pebble Beach (the bagpiper's spot)
      const pi = MONT.PLACES.findIndex(p => p.id === 'pebble');
      showPlace(pi >= 0 ? pi : 3);
      return;
    }
    showPlace(lessonIdx(mode) + Math.max(0, level - 1));
  }
  // ================= Music: pitch training, listen & match, and chords =================
  const NOTE_FREQ   = { A: 440.00, B: 493.88, C: 523.25, D: 587.33, E: 659.25, F: 698.46, G: 783.99 };
  const NOTE_COLORS = { A: '#e0466b', B: '#e78b16', C: '#d9a400', D: '#56aa2a', E: '#0f9aa6', F: '#137fc2', G: '#8a52c9' };
  const CHORDS = [
    { name: 'C Major', notes: ['C', 'E', 'G'] }, { name: 'F Major', notes: ['F', 'A', 'C'] },
    { name: 'G Major', notes: ['G', 'B', 'D'] }, { name: 'A Minor', notes: ['A', 'C', 'E'] },
    { name: 'D Minor', notes: ['D', 'F', 'A'] }, { name: 'E Minor', notes: ['E', 'G', 'B'] }
  ];
  const MUSIC_MODES = ['pitchtrain', 'pitchlisten', 'chords'];
  // grow the note set as the child improves: A B C first, then + D E, then + F G
  function notePool() {
    if (level <= 2) return ['A', 'B', 'C'];
    if (level <= 4) return ['A', 'B', 'C', 'D', 'E'];
    return ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
  }
  function noteFreqs(names) { return names.map(n => NOTE_FREQ[n]); }
  // The bagpiper who plays the notes (painted cutout; falls back to an emoji if the image is missing)
  function piperHTML(extra) {
    return '<div class="piperWrap">' +
      '<img class="piperImg" src="scenes/piper.png" alt="Bagpiper" ' +
      'onerror="this.style.display=\'none\'; this.parentNode.classList.add(\'noimg\')">' +
      (extra || '') + '</div>';
  }
  // A row of coloured note buttons; tapping one plays that note and answers.
  function renderNoteChoices(pool) {
    game.classList.add('choices-mode');
    choicesEl.innerHTML = '';
    pool.forEach(n => {
      const div = document.createElement('div');
      div.className = 'choice noteBtn';
      div.dataset.number = n;
      div.style.setProperty('--nbg', NOTE_COLORS[n]);
      div.innerHTML = '<span class="noteLtr">' + n + '</span><span class="noteMark">♪</span>';
      div.addEventListener('click', () => tryAnswer(n));   // the pitch is played by tryAnswer (also covers keyboard keys)
      choicesEl.appendChild(div);
    });
  }
  function buildPitch(showLetter) {
    const pool = notePool();
    const note = pick(pool);
    return {
      answer: note, kind: 'note', style: 'pitch', choices: true, note: note,
      name: 'pitch_' + note + (showLetter ? 't' : 'l'),
      render() {
        renderSpeakerTarget(piperHTML(showLetter
          ? '<span class="noteBig pipeNote" style="color:' + NOTE_COLORS[note] + '">' + note + '</span>'
          : '<span class="noteGlyph pipeNote">🎵</span>'));
        renderNoteChoices(pool);
      },
      play() { playTone([NOTE_FREQ[note]]); },
      revealAnswer() {
        renderSpeakerTarget(piperHTML('<span class="noteBig pipeNote" style="color:' + NOTE_COLORS[note] + '">' + note + '</span>'));
        renderNoteChoices(pool);
      }
    };
  }
  function renderChordCard(name, seq, revealed) {
    targetEl.style.color = '';
    targetEl.innerHTML = '<div class="chordCard">' + piperHTML('') + '<div class="chordName">' + name + '</div>' +
      '<div class="chordRow">' + seq.map((n, i) => {
        const cls = i < revealed ? 'cn done' : (i === revealed ? 'cn now' : 'cn');
        return '<span class="' + cls + '" style="--nbg:' + NOTE_COLORS[n] + '">' + (i < revealed ? n : '?') + '</span>';
      }).join('') + '</div>' +
      '<button type="button" class="speakerBtn chordReplay" aria-label="Hear the chord">🔊</button></div>';
    const rb = targetEl.querySelector('.chordReplay');
    if (rb) rb.addEventListener('click', e => { e.stopPropagation(); if (challenge && challenge.play) challenge.play(); });
  }
  function buildChords() {
    const pool = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];   // chords need every note available to tap
    const chord = pick(CHORDS);
    const seq = chord.notes.slice();
    return {
      style: 'seq', word: chord.name, seq: seq, idx: 0, answer: seq[0], kind: 'note', choices: true,
      name: 'chord_' + chord.name.replace(/\s/g, ''),
      render() { renderChordCard(chord.name, this.seq, this.idx); renderNoteChoices(pool); },
      play() { playTone(noteFreqs(seq), { dur: 1.3 }); },
      revealAll() { renderChordCard(chord.name, this.seq, this.seq.length); }
    };
  }

  function buildChallenge() {
    if (mode === 'pitchtrain')  return buildPitch(true);
    if (mode === 'pitchlisten') return buildPitch(false);
    if (mode === 'chords')      return buildChords();
    if (mode === 'hello')      return buildLangPick(true);
    if (mode === 'guesslang')  return buildLangPick(false);
    if (mode === 'wordsafari') return buildWordPick(ALL_ANIMALS);
    if (mode === 'colormix')   return buildWordPick(COLORS_DATA.concat(SHAPES_DATA));
    if (mode === 'countlang')  return buildCountLang();
    if (mode === 'samediff')   return buildSameDiff();
    if (mode === 'sounds')   return buildSounds();
    if (mode === 'listen')   return buildListen();
    if (mode === 'earmatch') return buildEarMatch();
    if (mode === 'countobj') return buildCountObjects();
    if (mode === 'math')     return buildMath();
    if (mode === 'spelling') return buildSpell();
    if (mode === 'counting') return buildCount();
    if (mode === 'colors')  return categoryChallenge(COLORS_DATA, 'color');
    if (mode === 'shapes')  return categoryChallenge(SHAPES_DATA, 'shape');
    if (mode === 'animals') return categoryChallenge(ANIMALS_DATA, 'animal');
    const pool = mode === 'letters' ? LETTERS : mode === 'numbers' ? NUMBERS : LETTERS.concat(NUMBERS);
    const ch = pick(pool);
    return { answer: ch, kind: /[0-9]/.test(ch) ? 'number' : 'letter', name: ch, style: 'plain',
      render() { targetEl.textContent = ch; targetEl.style.color = 'var(--blue)'; },
      revealAnswer() { targetEl.textContent = ch; targetEl.style.color = 'var(--blue)'; } };
  }

  function newTarget() {
    let next, tries = 0;
    do { next = buildChallenge(); tries++; } while (next.name === lastTarget && tries < 8);
    lastTarget = next.name;
    challenge = next;
    game.classList.toggle('num-answer', /^[0-9]$/.test(String(challenge.answer)));
    // wide centered target box for every picture-based challenge
    game.classList.toggle('big-target', ['sound', 'listen', 'count', 'math', 'letter'].includes(challenge.style));
    choicesEl.innerHTML = '';
    game.classList.remove('choices-mode');
    clearFeedback();                 // both cards dim until they answer
    clearEar(); targetWrong = 0;     // reset the Listen & Match repeat/reveal state
    next.render();
    targetEl.style.transform = 'scale(1)';
    hintStage = 0;
    clearKeyHighlights();
    scheduleHint();
    announce();
  }

  function announce() {
    // Language Island challenges carry their own play() (speaks a word/greeting in a chosen tongue).
    if (challenge.play) { challenge.play(); return; }
    const t = L(), cname = challenge.name, ans = challenge.answer, s = challenge.style;
    // Recorded persona clips wherever the phrase is enumerable; synth is only the fallback.
    if (s === 'plain') { playPersona(isNum(ans) ? 'find_num_' + ans : 'find_let_' + ans, t.find(ans), { rate: 0.95 }); return; }
    // shapes/colors/animals: name the thing — "Find the letter R, for Rabbit!"
    if (s === 'letter') { playPersona('find_for_' + challenge.itemKey, t.findFor(cname, ans), { rate: 0.95 }); return; }
    // spelling: say the word first — "Let's spell CAR. Find the letter C!"
    if (s === 'seq' && mode === 'spelling') { playPersona('spell_' + challenge.word, t.spell(challenge.word, ans), { rate: 0.95 }); return; }
    // counting: speak the FULL multi-digit number, then the first digit
    // (all 90 two-digit numbers are recorded; longer numbers fall back to synth)
    if (s === 'seq')   { playPersona('count_' + challenge.word, t.countIntro(challenge.word, ans), { rate: 0.95 }); return; }
    if (s === 'sound') { playPersona('sound_' + ans, t.sound(ans, challenge.word, challenge.sound), { rate: 0.95 }); return; }
    if (s === 'listen'){ playPersona('sound_' + ans, t.sound(ans, challenge.word, challenge.sound), { rate: 0.95 }); return; }
    if (s === 'count') { playPersona('howmany_' + challenge.creatures, t.howMany(locCreat(challenge.creatures)), { rate: 0.95 }); return; }
    if (s === 'number'){ playPersona('which_one', t.prompt.catNum, { rate: 0.95 }); return; }               // multiple-choice picker
    // Add & Subtract: every possible problem has a recorded clip (creatures shown on screen).
    if (s === 'math') {
      const key = 'math_' + (challenge.op === '+' ? 'add' : 'sub') + '_' + challenge.a + '_' + challenge.b;
      const phrase = (challenge.op === '+') ? t.mathAdd(challenge.a, challenge.b, locCreat(challenge.creature))
                                            : t.mathSub(challenge.a, challenge.b, locCreat(challenge.creature));
      playPersona(key, phrase, { rate: 0.95 });
      return;
    }
    speakName(t.find(ans), { rate: 0.95 });
  }

  // ---------- On-screen keyboard ----------
  const KB = [
    '1 2 3 4 5 6 7 8 9 0 ~Backspace',
    '~Tab Q W E R T Y U I O P',
    '~Caps A S D F G H J K L ~Enter',
    '~Shift Z X C V B N M ~Shift',
    '~Ctrl ~Alt ~Space ~Alt ~Ctrl'
  ];
  function buildKeyboard() {
    keyboardEl.innerHTML = '';
    KB.forEach(rowStr => {
      const row = document.createElement('div');
      row.className = 'krow';
      rowStr.split(' ').forEach(tok => {
        const k = document.createElement('div');
        if (tok[0] === '~') {
          const name = tok.slice(1);
          k.className = 'key mod' + (name === 'Space' ? ' spacebar' : '');
          k.textContent = name === 'Backspace' ? '⌫' : (name === 'Space' ? '' : name);
        } else {
          k.className = 'key active';
          k.dataset.key = tok.toUpperCase();
          k.textContent = tok.toUpperCase();
        }
        row.appendChild(k);
      });
      keyboardEl.appendChild(row);
    });
  }
  function clearKeyHighlights() {
    keyboardEl.querySelectorAll('.key').forEach(k => k.classList.remove('near', 'target', 'hit-correct', 'hit-wrong'));
  }
  // Hint stage 1: light up the 9 keys nearest the answer (answer is among them).
  function nearKeysHint() {
    keyboardEl.querySelectorAll('.key').forEach(k => k.classList.remove('near', 'target'));
    const ansEl = keyboardEl.querySelector('.key[data-key="' + challenge.answer + '"]');
    if (!ansEl) return;
    const ar = ansEl.getBoundingClientRect(), ax = ar.left + ar.width / 2, ay = ar.top + ar.height / 2;
    [...keyboardEl.querySelectorAll('.key.active')].map(k => {
      const r = k.getBoundingClientRect();
      const dx = r.left + r.width / 2 - ax, dy = r.top + r.height / 2 - ay;
      return { k, d: dx * dx + dy * dy };
    }).sort((a, b) => a.d - b.d).slice(0, 9).forEach(o => o.k.classList.add('near'));
  }
  // Hint stage 2: reveal the exact key + show the letter/number in the panel.
  function revealAnswerKey() {
    keyboardEl.querySelectorAll('.key').forEach(k => k.classList.remove('near'));
    const k = keyboardEl.querySelector('.key[data-key="' + challenge.answer + '"]');
    if (k) k.classList.add('target');
    if (challenge.revealAnswer) challenge.revealAnswer();
  }
  function clearHintTimer() { clearTimeout(hintTimer); hintTimer = null; }
  // Escalating help: after 5s idle show the 9-key cluster, then after 4 more
  // idle seconds reveal the exact key & the answer. Each keypress restarts the
  // current countdown (so it only helps when the child is stuck, not guessing).
  function scheduleHint() {
    clearHintTimer();
    if (!challenge || mode === 'free' || mode === 'earmatch' || challenge.choices || locked || hintStage >= 2) return;
    const delay = hintStage === 0 ? HINT_DELAYS.cluster : HINT_DELAYS.exact;
    hintTimer = setTimeout(() => {
      if (hintStage === 0) { hintStage = 1; nearKeysHint(); scheduleHint(); }
      else if (hintStage === 1) { hintStage = 2; revealAnswerKey(); }
    }, delay);
  }
  function flashKey(ch, ok) {
    const k = keyboardEl.querySelector('.key[data-key="' + ch + '"]');
    if (k) { k.classList.remove('target'); k.classList.add(ok ? 'hit-correct' : 'hit-wrong');
      setTimeout(() => k.classList.remove('hit-correct', 'hit-wrong'), 650); }
  }
  keyboardEl.addEventListener('click', e => {
    const k = e.target.closest('.key.active');
    if (!k || mode === 'free') return;
    tryAnswer(k.dataset.key);
  });

  // ---------- Celebration visuals ----------
  function confetti() {
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = pick(colors);
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = (-10 - Math.random() * 20) + 'vh';
      c.style.animationDelay = (Math.random() * 0.3) + 's';
      game.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }
  }
  const BUDDY_GESTURES = ['👏', '👍', '🤜', '🙌', '🎉', '✌️'];
  let buddyTimer = null;
  let buddyFace = '👦';
  function showBuddy() {
    const side = Math.random() < 0.5 ? 'left' : 'right';
    const gesture = pick(BUDDY_GESTURES);
    buddyEl.className = 'buddy ' + side;
    buddyEl.innerHTML = '';
    buddyEl.appendChild(makeImg('yako_cheer.png', 'buddyFace', '👦'));
    const g = document.createElement('span'); g.className = 'buddyGesture'; g.textContent = gesture;
    buddyEl.appendChild(g);
    void buddyEl.offsetWidth;
    buddyEl.classList.add('in');
    clearTimeout(buddyTimer);
    buddyTimer = setTimeout(() => buddyEl.classList.remove('in'), 2400);
  }
  function hideBuddy() { clearTimeout(buddyTimer); buddyEl.classList.remove('in'); }

  // Light up the matching painted card: top "Great job!" for correct, bottom "Oops!" for wrong.
  function showFeedback(ok) {
    fbGoodEl.classList.toggle('lit', ok);
    fbBadEl.classList.toggle('lit', !ok);
  }
  function clearFeedback() { fbGoodEl.classList.remove('lit'); fbBadEl.classList.remove('lit'); hideReaction(); mfbHint(); }

  function popChar(text, color) {
    const el = document.createElement('div');
    el.className = 'pop';
    el.textContent = text;
    el.style.color = color || pick(colors);
    el.style.fontSize = (window.innerHeight * 0.4) + 'px';
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.top  = (25 + Math.random() * 45) + '%';
    game.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  // ---------- Star bar / score ----------
  function updateStarbar() {
    starbarEl.innerHTML = '';
    for (let i = 0; i < STARS_PER_LEVEL; i++) {
      const s = document.createElement('span');
      s.className = 'lvlStar' + (i < levelStars ? ' on' : '');
      s.textContent = '★';
      starbarEl.appendChild(s);
    }
  }
  function updateScore() { scoreEl.textContent = '⭐ ' + totalStars; }

  // ---------- Game logic ----------
  function tryAnswer(pressed) {
    if (locked || !challenge) return;
    clearHintTimer();
    pressed = String(pressed).toUpperCase();
    if (pressed.length !== 1) return;
    // Music: sound the pitch of whatever note was pressed (button OR keyboard key), right or wrong
    if (MUSIC_MODES.indexOf(mode) >= 0 && NOTE_FREQ[pressed]) playTone([NOTE_FREQ[pressed]], { dur: 0.7, keep: true });
    if (challenge.style === 'seq') {
      if (pressed === challenge.answer) seqAdvance(pressed);
      else if (/[A-Z0-9]/.test(pressed)) { flashKey(pressed, false); wrong(pressed); }
      return;
    }
    const right = pressed === challenge.answer;
    flashKey(pressed, right);
    if (right) correct(pressed);
    else if (/[A-Z0-9]/.test(pressed)) wrong(pressed);
  }

  // A correct letter/digit in a Spelling/Counting word: advance, or finish the word.
  function seqAdvance(pressed) {
    stopAllSounds();
    clearHintTimer();
    flashKey(pressed, true);
    popChar(pressed, '#2bb673');
    playChime();
    challenge.idx++;
    if (challenge.idx >= challenge.seq.length) { seqComplete(); return; }
    // reveal progress and move to the next letter/digit
    challenge.answer = challenge.seq[challenge.idx];
    game.classList.toggle('num-answer', /^[0-9]$/.test(challenge.answer));
    challenge.render();
    clearKeyHighlights();
    hintStage = 0; scheduleHint();
    if (mfb) { mfb.className = 'show good'; mfb.innerHTML = '<b>Nice!</b><span>Keep going!</span>'; }
    if (mode !== 'chords') { const na = challenge.answer; playPersona(isNum(na) ? 'find_num_' + na : 'find_let_' + na, L().next(na), { rate: 1.0 }); }
  }
  function seqComplete() {
    locked = true;
    levelStars++;
    totalStars++; setNum('yako_points', totalStars);
    updateStarbar(); updateScore();
    const finished = levelStars >= STARS_PER_LEVEL;
    if (finished) levelElapsed = (performance.now() - levelStartTime) / 1000;
    challenge.revealAll();
    clearKeyHighlights();
    const w = challenge.word;
    confetti(); showBuddy(); showFeedback(true); playReaction(true); playChime();
    const dur = 2.0 + Math.random() * 1.5;
    playApplause(dur);
    if (mode === 'chords') {
      if (mfb) { mfb.className = 'show good'; mfb.innerHTML = '<b>' + w + '! 🎶</b><span>You made a chord!</span>'; }
      playTone(noteFreqs(challenge.seq), { dur: 1.5 });                 // ring the full chord in triumph
      speakName("That's " + w + '! You made a chord!', { rate: 1.0 });
    } else {
      if (mfb) {
        mfb.className = 'show good';
        mfb.innerHTML = '<b>' + (mode === 'spelling' ? ('You spelled ' + w + '!') : ("That's " + w + '!')) +
                        '</b><span>Great job!</span>';
      }
      playPersona(mode === 'spelling' ? 'done_spell' : 'done_num',
                  mode === 'spelling' ? L().doneSpell(w) : L().doneNum(w), { rate: 1.0 });   // real-voice completion (synth fallback)
    }
    roundTimer = setTimeout(() => {
      if (finished) completeLevel();
      else { locked = false; newTarget(); }
    }, dur * 1000 + 300);
  }

  function correct(pressed) {
    stopAllSounds();
    clearHintTimer();
    clearEar();
    locked = true;
    levelStars++;
    totalStars++; setNum('yako_points', totalStars);
    updateStarbar(); updateScore();
    const finished = levelStars >= STARS_PER_LEVEL;
    if (finished) levelElapsed = (performance.now() - levelStartTime) / 1000;

    if (challenge.revealAnswer) challenge.revealAnswer();   // show what it was
    clearKeyHighlights();
    popChar(pressed, '#2bb673');
    if (challenge.choices) highlightChoice(challenge.answer, true);
    targetEl.style.transform = 'scale(1.15)';
    const bl = targetEl.querySelector('.bigletter');
    if (bl) bl.style.color = '#2bb673';
    if (challenge.style === 'plain') targetEl.style.color = '#2bb673';

    confetti();
    showBuddy();
    showFeedback(true);
    playReaction(true);
    playChime();
    const dur = 2.0 + Math.random() * 1.5;        // 2–3.5 s between rounds
    playApplause(dur);
    playPersona(['cheer_1', 'cheer_2', 'cheer_3', 'cheer_4', 'cheer_5', 'cheer_6', 'cheer_7', 'cheer_8'], nextCheer(), { rate: 1.0 });   // real-voice cheer (synth fallback)

    roundTimer = setTimeout(() => {
      if (finished) completeLevel();
      else { locked = false; newTarget(); }
    }, dur * 1000 + 300);
  }

  function wrongPhrase(pressed) {
    const t = L();
    if (challenge.style === 'count')  return t.wrongCount(locCreat(challenge.creatures));
    if (challenge.style === 'math')   return t.wrongMath();
    if (challenge.choices)            return t.again();   // number picker + all Language Island modes
    return t.wrong(t.dk(String(pressed).toUpperCase()), challenge.answer);
  }
  function wrong(keyPressed) {
    stopAllSounds();
    levelMistakes++;
    popChar(keyPressed, '#e0466b');
    if (challenge.choices) highlightChoice(keyPressed, false);
    showFeedback(false);
    playReaction(false);
    playTryAgainTone();
    targetEl.style.transform = 'scale(0.94)';
    setTimeout(() => { targetEl.style.transform = 'scale(1)'; }, 150);
    playPersona('try', wrongPhrase(keyPressed));   // real-voice "try again" (synth fallback)
    // Listen & Match: after 2 wrong guesses, finally reveal the hidden letter/number
    if (mode === 'earmatch') { targetWrong++; if (targetWrong >= 2 && challenge.revealAnswer) challenge.revealAnswer(); }
    scheduleHint();   // restart the idle countdown toward the next hint
  }

  // ---------- Level complete: stats, coaching verdict, and what happens next ----------
  let defaultWinAct = 'level';   // what a tap / the timeout does on the win card
  function completeLevel() {
    stopAllSounds();
    const bestKey = 'yako_best_' + mode, lastKey = 'yako_last_' + mode, cntKey = 'yako_count_' + mode;
    const prevBest = getNum(bestKey), prevLast = getNum(lastKey);
    setNum(cntKey, (getNum(cntKey) || 0) + 1);
    // How Many?: raise the object cap (4 → 6 → 9) once a level is done well
    if (mode === 'countobj') {
      const tier = countMax();
      if (tier < 9 && levelMistakes <= 1 && levelElapsed <= 8 * STARS_PER_LEVEL)
        setNum('yako_count_tier', tier === 4 ? 6 : 9);
    }
    const isBest = (prevBest == null) || (levelElapsed < prevBest);
    if (isBest) setNum(bestKey, levelElapsed);
    setNum(lastKey, levelElapsed);
    const bestShown = isBest ? levelElapsed : prevBest;
    const faster = prevLast != null && (prevLast - levelElapsed) > 0.05;
    const slower = prevLast != null && (levelElapsed - prevLast) > 0.05;

    let improve = '';
    if (prevLast != null) {
      const d = prevLast - levelElapsed;
      if (d > 0.05) improve = "That's " + fmt(d) + " seconds faster than last time!";
      else if (d < -0.05) improve = "A little slower than last time — keep practicing!";
      else improve = "About the same as last time!";
    }
    if (isBest && prevBest != null) improve = "New best time! " + improve;

    // Coaching verdict: mistakes matter most, then speed vs their own last run.
    const V = L().verdicts;
    let vKey;
    if (levelMistakes === 0 && isBest && prevBest != null) vKey = 'best';
    else if (levelMistakes === 0) vKey = 'perfect';
    else if (levelMistakes > 2)   vKey = 'practice';
    else if (faster)              vKey = 'faster';
    else if (slower)              vKey = 'slower';
    else                          vKey = 'good';
    const gated = levelMistakes > 2;                    // too many misses → practice this one again
    const nextIdx = lessonIdx(mode) + 1;
    const isCampaign = playMode === 'campaign';
    const lastLesson = nextIdx >= LESSONS.length;

    let buttons;
    if (isCampaign) {
      defaultWinAct = gated ? 'repeat' : (lastLesson ? 'finish' : 'advance');
      buttons = gated
        ? '<button class="winBtn" data-act="repeat">💪 Try this lesson again</button>'
        : (lastLesson
            ? '<button class="winBtn" data-act="finish">🏆 You did every lesson!</button>'
            : '<button class="winBtn" data-act="advance">▶ Next lesson: ' + LESSONS[nextIdx][1] + '</button>');
    } else {
      defaultWinAct = 'level';
      buttons = '<button class="winBtn alt" data-act="level">🔁 Keep playing ' + lessonName(mode) + '</button>' +
        (lastLesson ? '' : '<button class="winBtn" data-act="nextlesson">▶ Next lesson: ' + LESSONS[nextIdx][1] + '</button>');
    }

    winEl.innerHTML =
      '<div class="winCard">' +
        '<img class="winYako" src="yako_cheer.png" alt="" onerror="this.style.display=\'none\'">' +
        '<div class="winTitle">' + lessonName(mode) + ' — Level ' + level + ' complete!</div>' +
        '<div class="winStars">★★★★★</div>' +
        '<div class="winTime">Time: ' + fmt(levelElapsed) + 's</div>' +
        '<div class="winBest">Best: ' + fmt(bestShown) + 's</div>' +

  (function loopBackgrounds() {
    const RATE = 0.40;                                        // 40% speed, as before
    const vids = [document.getElementById('bgvid'), document.getElementById('freeBg'), document.getElementById('gameBg'), document.getElementById('sceneBg')].filter(Boolean);
    // NOTE: offsetParent is always null for position:fixed elements — use
    // getClientRects() to test real visibility (it also sees hidden ancestors).
    const showing = v => v.getClientRects().length > 0;
    vids.forEach(v => {
      v.loop = true; v.muted = true; v.playsInline = true; v.setAttribute('playsinline', '');
      try { v.playbackRate = RATE; } catch (e) {}
      v.addEventListener('play',   () => { try { v.playbackRate = RATE; } catch (e) {} });
      v.addEventListener('pause',  () => { if (showing(v)) v.play().catch(() => {}); });  // resist stalls
    });
    function kick() {
      vids.forEach(v => {
        if (!showing(v)) return;                              // not currently visible → leave it
        try { v.playbackRate = RATE; } catch (e) {}
        if (v.paused || v.ended) { v.play().catch(() => {}); }
      });
    }
    kick();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) kick(); });

    placePopEl.appendChild(b);
  });
  function hidePlacePop() { if (placePopEl) placePopEl.classList.remove('open'); }
  function hidePlaceCard() { if (placeCardEl && !placeCardEl.hidden) { placeCardEl.hidden = true; try { placeAudio.pause(); } catch (e) {} stopAllSounds(); } }
  // Traveling somewhere shows Yako + his puppy with a fun fact and what he loves to do there.
  function goPlace(i) {
    showPlace(i);
    const p = MONT.PLACES[curPlaceIdx];
    const img = placeCardEl.querySelector('.pcSceneImg');
    const card = p.scene.replace(/\.png$/, '_card.png');       // a different painted view for the card
    img.onerror = () => { img.onerror = null; img.src = p.scene; };  // fall back to the backdrop still
    img.src = card;
    // a different Yako-and-puppy pose per place (hug, fetch, walk, scratch…); falls back to the cheer art
    const yk = placeCardEl.querySelector('.pcYako');
    const ykSrc = p.scene.replace(/\.png$/, '_yako.png');
    yk.onerror = () => { yk.onerror = null; yk.src = 'yako_cheer.png'; };
    yk.style.display = '';
    yk.src = ykSrc;
    placeCardEl.querySelector('.pcPlace').textContent = p.name;
    placeCardEl.querySelector('.pcFact').textContent  = p.fact  || '';
    placeCardEl.querySelector('.pcLoves').textContent = p.loves || '';
    placeCardEl.hidden = false;
    stopAllSounds();
    // Narrate the place ONCE, in the recorded Mom voice (synth fallback if the clip is missing/blocked)
    try { placeAudio.pause(); placeAudio.currentTime = 0; } catch (e) {}
    if (!A.isMuted()) {
      const say = () => speak((p.fact || '') + ' ' + (p.loves || ''), { rate: 1.0 });
      placeAudio.src = 'voice/place/' + p.id + '.mp3';
      placeAudio.volume = A.getVolume();
      placeAudio.onerror = say;
      const pl = placeAudio.play();
      if (pl && pl.catch) pl.catch(say);
    }
  }
  if (placeTagEl) placeTagEl.addEventListener('click', e => {
    e.stopPropagation();
    if (!placePopEl) return;
    const r = placeTagEl.getBoundingClientRect();
    placePopEl.style.top = (r.bottom + 8) + 'px';
    placePopEl.style.left = r.left + 'px';           // line the dropdown up under the button
    placePopEl.classList.toggle('open');
  });
  if (placeCardEl) placeCardEl.addEventListener('click', hidePlaceCard);   // tap the card to close it
  document.addEventListener('click', hidePlacePop);                        // tap elsewhere closes the dropdown

  // ---- Volume: separate Music and Voice-over sliders (in-game media player) ----
  const volPopEl   = document.getElementById('volPop');
  const volMusicEl = document.getElementById('volMusic');
  const volVoiceEl = document.getElementById('volVoice');
  // musicDuck lowers the music under the narrator during lessons (1 = full, .6 = −40%)
  let musicDuck = 1, duckTimer = null;
  function applyMusicVolume() { themeMusic.volume = Math.min(1, Math.max(0, musicVol * musicDuck)); }
  function fadeMusicDuck(target, ms) {
    clearInterval(duckTimer);
    const start = musicDuck, delta = target - start, t0 = performance.now(); ms = ms || 1000;
    if (Math.abs(delta) < 0.001) { musicDuck = target; applyMusicVolume(); return; }
    duckTimer = setInterval(() => {
      const p = Math.min(1, (performance.now() - t0) / ms);
      musicDuck = start + delta * p;
      applyMusicVolume();
      if (p >= 1) { clearInterval(duckTimer); duckTimer = null; }
    }, 40);
  }
  window.fadeMusicDuck = fadeMusicDuck;   // callable from startGame / backToMenu below
  function setMusicVol(v) {
    musicVol = Math.min(1, Math.max(0, v));
    try { localStorage.setItem('yako_music_vol', String(musicVol)); } catch (e) {}
    applyMusicVolume();
  }
  if (volMusicEl) { volMusicEl.value = Math.round(musicVol * 100);
    volMusicEl.addEventListener('input', () => setMusicVol(volMusicEl.value / 100)); }
  if (volVoiceEl) { volVoiceEl.value = Math.round(A.getVolume() * 100);
    volVoiceEl.addEventListener('input', () => A.setVolume(volVoiceEl.value / 100)); }
  applyMusicVolume();
  // in-game media player (bottom center): play/pause + next
  if (gpPlayEl) gpPlayEl.addEventListener('click', toggleMusicPause);
  if (gpNextEl) gpNextEl.addEventListener('click', nextTrack);
  // Audio mixer lives on the round Sound button (bottom-right): hover (desktop) or
  // tap (mobile) opens it; inside are a mute toggle + the Music/Voice faders.
  let volHideT = null;
  function showVolPop() { clearTimeout(volHideT); if (volPopEl) volPopEl.classList.add('show'); }
  function hideVolPopSoon() { clearTimeout(volHideT); volHideT = setTimeout(() => volPopEl && volPopEl.classList.remove('show'), 800); }
  const volMuteEl = document.getElementById('volMute');
  function syncMuteUI() {
    const m = A.isMuted();
    soundBtn.classList.toggle('muted', m);
    if (volMuteEl) { volMuteEl.classList.toggle('muted', m); volMuteEl.textContent = m ? '🔇 Sound off' : '🔊 Sound on'; }
  }
  [soundBtn, volPopEl].forEach(el => { if (!el) return;
    el.addEventListener('mouseenter', showVolPop);
    el.addEventListener('mouseleave', hideVolPopSoon); });
  soundBtn.addEventListener('click', e => { e.stopPropagation(); if (volPopEl) volPopEl.classList.toggle('show'); });  // tap opens the mixer (mobile)
  if (volMuteEl) volMuteEl.addEventListener('click', () => { A.setMuted(!A.isMuted()); syncMuteUI(); updateThemeMusic(); });
  syncMuteUI();        // reflect the persisted mute on load

  // ---- Narrator language + character toggles (home menu) ----
  const PERSONA_EMOJI = { mom: '👩', dad: '👨', grandpa: '👴', grandma: '👵' };
  const langValEl = document.getElementById('langVal');
  const personaValEl = document.getElementById('personaVal');
  function flagFor(lang) { const b = document.querySelector('.flagBtn[data-lang="' + lang + '"]'); return b ? b.textContent : '🇬🇧'; }
  function bump(el) { if (!el) return; el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
  function refreshVoiceUI() {
    const lang = I.getLang(), per = A.getPersona();
    document.querySelectorAll('.flagBtn').forEach(b => b.classList.toggle('sel', b.dataset.lang === lang));
    document.querySelectorAll('.personaBtn').forEach(b => b.classList.toggle('sel', b.dataset.persona === per));
    if (langValEl) langValEl.textContent = flagFor(lang);
    if (personaValEl) personaValEl.textContent = PERSONA_EMOJI[per] || '👩';
  }
  // Compact pickers: tap to open a popover, tap an option to choose (with a bounce + voice preview).
  function closePops() {
    document.querySelectorAll('.pickPop.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.pickBtn.open').forEach(b => { b.classList.remove('open'); b.setAttribute('aria-expanded', 'false'); });
  }
  function placePop(btn, pop) {   // fixed popover, centered just below the picker button
    const r = btn.getBoundingClientRect();
    pop.style.left = (r.left + r.width / 2) + 'px';
    pop.style.bottom = 'auto';
    pop.style.top = (r.bottom + 8) + 'px';
  }
  function wirePicker(btnId, popId) {
    const btn = document.getElementById(btnId), pop = document.getElementById(popId);
    if (!btn || !pop) return;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = pop.classList.contains('open'); closePops();
      if (!isOpen) { placePop(btn, pop); pop.classList.add('open'); btn.classList.add('open'); btn.setAttribute('aria-expanded', 'true'); ensureAudio(); }
    });
    pop.addEventListener('click', e => e.stopPropagation());
  }
  wirePicker('langPickBtn', 'langPop');
  wirePicker('personaPickBtn', 'personaPop');
  const langPopEl = document.getElementById('langPop'), personaPopEl = document.getElementById('personaPop');
  if (langPopEl) langPopEl.addEventListener('click', (e) => {
    const b = e.target.closest('.flagBtn'); if (!b) return;
    I.setLang(b.dataset.lang); pickVoice(); refreshVoiceUI(); ensureAudio(); bump(langValEl); closePops();
    stopAllSounds(); playPersona('greet', L().greet);   // hear the chosen language right away
  });
  if (personaPopEl) personaPopEl.addEventListener('click', (e) => {
    const b = e.target.closest('.personaBtn'); if (!b) return;
    A.setPersona(b.dataset.persona); pickVoice(); refreshVoiceUI(); ensureAudio(); bump(personaValEl); closePops();
    if (profileChipEl && !profileChipEl.hidden) pcAvatarEl.textContent = PERSONA_EMOJI[A.getPersona()] || '🙂';
    stopAllSounds(); playPersona('greet', L().greet);   // hear the chosen narrator right away
  });
  document.addEventListener('click', closePops);   // tapping elsewhere closes the popover
  const homeCardEl = document.querySelector('.homeCard');
  if (homeCardEl) homeCardEl.addEventListener('scroll', closePops);   // scrolling the card closes any open picker
  window.addEventListener('resize', closePops);
  refreshVoiceUI();

  // ---- Returning-player chip: Yako remembers the child + their star total on this device ----
  const profileChipEl = document.getElementById('profileChip');
  const pcNameEl = document.getElementById('pcName'), pcStarsEl = document.getElementById('pcStars');
  const pcAvatarEl = document.getElementById('pcAvatar'), pcSwitchEl = document.getElementById('pcSwitch');
  function refreshProfileChip() {
    let name = ''; try { name = localStorage.getItem('kbfun_name') || ''; } catch (e) {}
    if (!profileChipEl) return;
    if (name) {
      pcNameEl.textContent = name;
      pcStarsEl.textContent = '⭐ ' + (getNum('yako_points') || 0);
      pcAvatarEl.textContent = PERSONA_EMOJI[A.getPersona()] || '🙂';
      profileChipEl.hidden = false;
      if (nameInput && !nameInput.value) nameInput.value = name;
    } else { profileChipEl.hidden = true; }
  }
  if (pcSwitchEl) pcSwitchEl.addEventListener('click', (e) => {
    e.stopPropagation();
    try { localStorage.removeItem('kbfun_name'); } catch (e) {}
    if (nameInput) { nameInput.value = ''; nameInput.focus(); }
    refreshProfileChip();
  });
  refreshProfileChip();

  // Touchscreen taps in free play make a burst
  document.addEventListener('pointerdown', (e) => {
    if (startScreen.style.display === 'none' && mode === 'free' && !e.target.closest('button')) popChar('★');
  });
})();

// ---- Animated favicon: gently wave/rock Yako in the browser tab ----
(function () {
  const link = document.querySelector("link[rel='icon']");
  if (!link || typeof document.createElement('canvas').getContext !== 'function') return;
  const SIZE = 64;
  const cv = document.createElement('canvas'); cv.width = cv.height = SIZE;
  const cx = cv.getContext('2d');
  const img = new Image();
  let frame = 0;
  function draw() {
    const t = (frame++) * 0.08;                  // ~12.5 fps
    const ang = Math.sin(t * 3.4) * 0.17;        // rock ~±10°  (waving feel)
    const bob = Math.sin(t * 5.0) * 1.6;         // subtle bounce
    const sc  = 0.97 + 0.03 * Math.abs(Math.sin(t * 5.0)); // tiny breathe
    cx.clearRect(0, 0, SIZE, SIZE);
    cx.save();
    cx.translate(SIZE / 2, SIZE / 2 + bob);
    cx.rotate(ang);
    cx.scale(sc, sc);
    cx.drawImage(img, -SIZE / 2, -SIZE / 2, SIZE, SIZE);
    cx.restore();
    try { link.href = cv.toDataURL('image/png'); } catch (e) {}
  }
  img.onload = function () { draw(); setInterval(draw, 80); };
  img.src = 'ui/favicon.png';
})();

// ---- PWA: register the service worker (offline core + installable) ----
// Relative path so it works from the GitHub Pages subpath and the LAN server alike.
// sw.js is network-first and never intercepts audio/video or ranged requests,
// so the background-video loop and voice streaming keep working.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').catch(function () {});
  });
}
</script>
