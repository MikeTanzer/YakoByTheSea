<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yako by the Sea — Learn & Play!</title>
<link rel="icon" type="image/png" href="ui/favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2f6fb0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yako">
<link rel="apple-touch-icon" href="ui/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --parch:  #f7eccb;
    --parch2: #fdf6e0;
    --gold:   #cba24a;
    --gold-d: #a9762a;
    --ink:    #5b4327;
    --blue:   #2f6fb0;
    --blue-d: #27598f;
  }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden; color: var(--ink);
    font-family: 'Baloo 2', 'Fredoka', -apple-system, "Comic Sans MS", "Segoe UI", sans-serif;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;                 /* no pull-to-refresh / bounce on mobile during play */
  }
  /* snappy, flicker-free taps on touchscreens */
  * { -webkit-tap-highlight-color: transparent; }
  button, .hotspot, .choice, .modeBtn, .flagBtn, .personaBtn, .pickBtn { touch-action: manipulation; }
  /* Real Carmel-by-the-Sea beach photo ("background.jpg"), with a seaside
     gradient as the fallback if the photo file isn't present. */
  body {
    background: linear-gradient(180deg, #9ed8f0 0%, #bfe7f4 28%, #76bcd9 46%, #4ea7c9 56%, #ead9ab 72%, #ddc593 100%);
    background-attachment: fixed;
  }

  /* ---------- Start screen ---------- */
  #start {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 10; overflow: hidden; background: #3b6b86;
  }
  #bgvid { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

  /* ===== Home menu composed from kit pieces over the animated video ===== */
  .homeUI { position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; gap: 1.3vh; max-height: 97vh; }
  .homeTitle { font-family: 'Baloo 2'; font-weight: 800; font-size: 6vw; line-height: .95; text-align: center;
    color: var(--blue);
    text-shadow: 0 0 3px #fff, 0 2px 0 #fff, 2px 0 0 #fff, -2px 0 0 #fff, 0 -2px 0 #fff, 0 4px 14px rgba(0,0,0,.5); }
  .homeTitle span { display: block; font-size: .62em; color: var(--gold-d); }
  .homeRibbon { font-size: 1.7vw; font-weight: 700; color: #7a5a2e; background: #f6d9a8;
    border: 3px solid var(--gold); border-radius: 999px; padding: .4vh 1.6vw; box-shadow: 0 4px 10px rgba(60,45,15,.3); }
  .homeCard { background: #f4e8c8; border: 5px solid var(--gold); border-radius: 26px;
    padding: 2vh 2.6vw; display: flex; flex-direction: column; align-items: center; gap: 1.5vh;
    box-shadow: 0 16px 36px rgba(40,30,10,.45), inset 0 0 0 3px rgba(255,255,255,.4);
    max-height: 76vh; overflow-y: auto; overflow-x: hidden;   /* whole card scrolls; sub-menu buttons stay fully visible */
    scrollbar-width: thin; scrollbar-color: var(--gold) transparent; -webkit-overflow-scrolling: touch; }
  .homeCard::-webkit-scrollbar { width: 10px; }
  .homeCard::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 999px; border: 2px solid #f4e8c8; }
  .homeCard .nameRow { display: flex; align-items: center; gap: 1.2vw; font-size: 2.4vh; font-weight: 800; color: var(--ink);
    width: 100%; box-sizing: border-box; }   /* full width so the label can't be clipped by centering overflow */
  .homeCard .nameRow label { flex: 0 0 auto; white-space: nowrap; }   /* keep "My name is" on one line */
  .homeCard .nameRow input { flex: 1 1 auto; min-width: 0; width: auto; }
  #start #nameInput {
    font-family: 'Baloo 2'; font-weight: 700; font-size: 2.4vh; text-align: center;
    color: var(--blue-d); flex: 1 1 auto; width: 100%; max-width: 24em; min-width: 0; padding: .8vh 1.2vw;
    background: linear-gradient(#fffdf6, #f6efdc);
    border: 2px solid #d9c38a; border-radius: 14px; outline: none;
    box-shadow: inset 0 2px 5px rgba(120,90,40,.16), 0 2px 3px rgba(255,255,255,.5);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  #start #nameInput::placeholder { color: #bcab83; font-weight: 500; font-size: .8em; }
  #start #nameInput:focus { border-color: var(--blue);
    box-shadow: inset 0 2px 5px rgba(120,90,40,.12), 0 0 0 3px rgba(47,111,176,.25); background: #fffef9; }
  .homeCard .ansRow { display: flex; align-items: center; gap: .9vw; font-size: 1.7vh; color: #6b5532; font-weight: 600; flex-wrap: wrap; justify-content: center; }
  #start .ansBtn { width: 9vw; min-width: 118px; height: 5vh; min-height: 40px; background: transparent;
    border: none; box-shadow: none; background-size: 100% 100%; background-repeat: no-repeat; cursor: pointer;
    padding: 0; transition: transform .1s ease; }
  #start .ansBtn:active { transform: scale(.95); }
  #start .ansBtn[data-ans="letter"]        { background-image: url('ui/first_off.png'); }
  #start .ansBtn[data-ans="letter"].active { background-image: url('ui/first_on.png'); }
  #start .ansBtn[data-ans="number"]        { background-image: url('ui/number_off.png'); }
  #start .ansBtn[data-ans="number"].active { background-image: url('ui/number_on.png'); }
  /* ===== Clean all-CSS mode buttons (uniform 3-D bevel + gold border) ===== */
  .btnGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.7vh 1.4vw;
    width: min(840px, 88vw); max-width: none; }
  #start .btnGrid .modeBtn {
    --bg: #777; position: relative; width: auto; min-width: 0; height: auto; min-height: clamp(96px, 12vh, 132px);
    border: 4px solid #f2d274; border-radius: 22px; padding: 1.4vh 16px 1.1vh; cursor: pointer; text-align: center;
    color: #fff7e5; font-family: Georgia, serif; overflow: hidden;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), transparent 28%),
      linear-gradient(180deg, color-mix(in srgb, var(--bg), #fff 12%), var(--bg));
    box-shadow: 0 8px 0 color-mix(in srgb, var(--bg), #000 38%), 0 14px 20px rgba(34,21,4,.24);
    outline: 3px solid color-mix(in srgb, var(--bg), #000 30%); outline-offset: 0;
    transition: transform .12s ease, box-shadow .12s ease; }
  #start .btnGrid .modeBtn::before { content: ''; position: absolute; inset: 6px; pointer-events: none;
    border: 2px solid rgba(255,255,255,.7); border-radius: 16px; }
  #start .btnGrid .modeBtn::after { content: ''; position: absolute; inset: 0; pointer-events: none; opacity: .18;
    background-image: radial-gradient(rgba(255,255,255,.65) 1px, transparent 1px); background-size: 12px 12px; mix-blend-mode: soft-light; }
  #start .btnGrid .modeBtn:hover { transform: translateY(-2px); }
  #start .btnGrid .modeBtn:active { transform: translateY(5px);
    box-shadow: 0 3px 0 color-mix(in srgb, var(--bg), #000 38%), 0 6px 10px rgba(34,21,4,.18); }
  #start .btnGrid .modeBtn .title { position: relative; z-index: 1; display: block; font-weight: 900; line-height: 1.05;
    font-size: clamp(18px, 1.9vw, 30px); margin-bottom: .7vh; color: #fff7e5;
    max-width: 100%; overflow-wrap: break-word;   /* wrap between words; only break a word as a last resort */
    text-shadow: 2px 2px 0 rgba(35,22,8,.85), -1px -1px 0 rgba(35,22,8,.35); }
  #start .btnGrid .modeBtn .sub { position: relative; z-index: 1; display: block; color: #fff7e5;
    font-family: 'Trebuchet MS', Georgia, serif; font-weight: 900; font-size: clamp(15px, 1.4vw, 24px);
    letter-spacing: .16em; text-shadow: 2px 2px 0 rgba(35,22,8,.7); }
  #start .btnGrid .modeBtn .icons { position: relative; z-index: 1; display: block; font-size: clamp(18px, 1.7vw, 28px);
    letter-spacing: .16em; text-shadow: 0 3px 0 rgba(0,0,0,.35); }
  #start .modeBtn[data-mode="both"] .title,
  #start .modeBtn[data-mode="sounds"] .title,
  #start .modeBtn[data-mode="math"] .title { font-size: clamp(15px, 1.5vw, 23px); }
  /* longer labels get a smaller font so they never touch the inner border */
  #start .modeBtn[data-mode="countlang"] .title,
  #start .modeBtn[data-mode="colormix"] .title { font-size: clamp(14px, 1.35vw, 20px); }
  #start .modeBtn[data-mode="pitchtrain"] .title,
  #start .modeBtn[data-mode="pitchlisten"] .title { font-size: clamp(12px, 1.15vw, 17px); }
  #start .modeBtn[data-mode="numbers"] .title { font-size: clamp(13px, 1.35vw, 20px); white-space: nowrap; }   /* "Numbers" on one line, inside the border */
  /* longest single words ("Language", "Different?") need the smallest size to fit unbroken */
  #start .modeBtn[data-mode="guesslang"] .title,
  #start .modeBtn[data-mode="samediff"] .title { font-size: clamp(12px, 1.15vw, 17px); }
  #start .modeBtn[data-mode="free"] .sub  { letter-spacing: 0; font-size: clamp(24px, 2.2vw, 34px); }
  /* per-mode colours */
  #start .modeBtn[data-mode="letters"]  { --bg: #137fc2; }
  #start .modeBtn[data-mode="numbers"]  { --bg: #56aa2a; }
  #start .modeBtn[data-mode="both"]     { --bg: #a73bb0; }
  #start .modeBtn[data-mode="shapes"]   { --bg: #199f94; }
  #start .modeBtn[data-mode="colors"]   { --bg: #df4050; }
  #start .modeBtn[data-mode="animals"]  { --bg: #e78b16; }
  #start .modeBtn[data-mode="spelling"] { --bg: #c77b14; }
  #start .modeBtn[data-mode="free"]     { --bg: #6257c9; }
  #start .modeBtn[data-mode="counting"] { --bg: #199f94; }
  #start .modeBtn[data-mode="sounds"]   { --bg: #c2487e; }
  #start .modeBtn[data-mode="countobj"] { --bg: #d98324; }
  #start .modeBtn[data-mode="math"]     { --bg: #4a8f8a; }
  #start .modeBtn[data-mode="listen"]   { --bg: #7a63d0; }
  #start .modeBtn[data-mode="listen"] .title { font-size: clamp(15px, 1.5vw, 23px); }

  /* ===== START (campaign) button + lesson chooser ===== */
  #startBtn {
    --bg: #e0a11c; position: relative; width: 100%; box-sizing: border-box; min-height: clamp(88px, 11vh, 120px);
    border: 4px solid #f2d274; border-radius: 24px; padding: 1.4vh 1vw 1.1vh; cursor: pointer; text-align: center;
    color: #fff7e5; font-family: Georgia, serif; overflow: hidden;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.25), transparent 30%),
      linear-gradient(180deg, color-mix(in srgb, var(--bg), #fff 16%), var(--bg));
    box-shadow: 0 9px 0 color-mix(in srgb, var(--bg), #000 38%), 0 16px 22px rgba(34,21,4,.28);
    outline: 3px solid color-mix(in srgb, var(--bg), #000 30%);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  #startBtn::before { content: ''; position: absolute; inset: 6px; pointer-events: none;
    border: 2px solid rgba(255,255,255,.7); border-radius: 18px; }
  #startBtn:hover { transform: translateY(-2px); }
  #startBtn:active { transform: translateY(5px);
    box-shadow: 0 3px 0 color-mix(in srgb, var(--bg), #000 38%), 0 6px 10px rgba(34,21,4,.18); }
  #startBtn .title { display: block; font-weight: 900; line-height: 1; font-size: clamp(28px, 3vw, 44px);
    letter-spacing: .1em; margin-bottom: .6vh; text-shadow: 2px 2px 0 rgba(35,22,8,.85); }
  #startBtn .sub { display: block; font-weight: 900; font-size: clamp(13px, 1.3vw, 20px);
    font-family: 'Trebuchet MS', Georgia, serif; letter-spacing: .06em; text-shadow: 1px 1px 0 rgba(35,22,8,.7); }
  #chooseBtn { cursor: pointer; border: 3px solid var(--gold); border-radius: 999px;
    background: #fff7df; color: #7a5a2e; font-family: 'Baloo 2', Georgia, serif; font-weight: 800;
    font-size: clamp(14px, 1.3vw, 20px); padding: .8vh 2.4vw; box-shadow: 0 4px 10px rgba(60,45,15,.25);
    transition: transform .12s ease; }
  #chooseBtn:hover { transform: translateY(-2px); }
  #chooseBtn .chev { display: inline-block; transition: transform .2s ease; }
  .homeCard:not(.lessonsOpen) .lessonGroups { display: none; }
  /* ===== "Choose a lesson" swaps the whole card to a dedicated lessons page ===== */
  .homeCard.lessonsOpen > :not(.lessonGroups):not(.lessonsHead) { display: none !important; }
  .homeCard.lessonsOpen { max-height: 80vh; }
  .lessonsHead { display: none; width: 100%; align-items: center; gap: 1vw; }
  .homeCard.lessonsOpen .lessonsHead { display: flex; }
  #lessonsBack { cursor: pointer; flex: 0 0 auto; border: 3px solid var(--gold); border-radius: 999px;
    background: #fff7df; color: #7a5a2e; font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: clamp(13px, 1.2vw, 18px); padding: .7vh 1.6vw; box-shadow: 0 3px 8px rgba(60,45,15,.22);
    transition: transform .12s ease; }
  #lessonsBack:hover { transform: translateY(-1px); }
  #lessonsBack:active { transform: scale(.94); }
  .lessonsHead .lhTitle { flex: 1; text-align: center; font-family: 'Baloo 2', sans-serif; font-weight: 800;
    color: #6e4f24; font-size: clamp(16px, 1.7vw, 23px); }
  /* invisible mirror of the Back button so the title stays centered */
  .lessonsHead .lhSpacer { flex: 0 0 auto; visibility: hidden; border: 3px solid transparent;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(13px, 1.2vw, 18px); padding: .7vh 1.6vw; }
  #lessonsFun { cursor: pointer; flex: 0 0 auto; border: 3px solid var(--gold); border-radius: 999px;
    background: linear-gradient(180deg, #ffd977, #f0b73c); color: #5b4327;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: clamp(13px, 1.2vw, 18px);
    padding: .7vh 1.6vw; box-shadow: 0 3px 8px rgba(60,45,15,.28);
    transition: transform .12s ease; }
  #lessonsFun:hover { transform: translateY(-1px); }
  #lessonsFun:active { transform: scale(.94); }
  /* ===== Collapsible lesson groups (scales as levels grow) ===== */
  /* closed groups sit in a 2×2 grid of square tiles; an open group spans the full width */
  .lessonGroups { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2vh 1.2vw; width: 100%; align-items: start; }
  .lgroup.open { grid-column: 1 / -1; }
  .lgroup .btnGrid { grid-template-columns: repeat(2, 1fr); }   /* roomier buttons in the narrow card */
  .lgroup { border: 3px solid var(--gold); border-radius: 18px; background: rgba(255,255,255,.42); overflow: hidden; }
  /* square tile: big icon over a centered name */
  .groupHead { width: 100%; aspect-ratio: 1 / 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .8vh; cursor: pointer;
    background: linear-gradient(#f7e4b4, #eccf88); border: none; border-radius: 15px;
    padding: 1.2vh 1vw; font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #6e4f24;
    font-size: clamp(15px, 1.5vw, 21px); text-align: center; transition: transform .12s ease; }
  .groupHead:hover { transform: translateY(-2px); }
  .groupHead:active { transform: scale(.97); }
  .groupHead .ghIcon { font-size: 2.8em; line-height: 1; }
  .groupHead .ghName { flex: none; }
  .groupHead .chev { display: none; }   /* no chevron on the square tiles */
  /* when a group is open it becomes a normal full-width header bar with the lessons below */
  .lgroup.open .groupHead { aspect-ratio: auto; flex-direction: row; justify-content: flex-start;
    text-align: left; gap: .8vw; padding: 1.1vh 1.4vw; }
  .lgroup.open .groupHead .ghIcon { font-size: 1.4em; }
  .lgroup.open .groupHead .ghName { flex: 1; }
  .lgroup.open .groupHead .chev { display: block; transition: transform .2s ease; font-size: 1.1em; transform: rotate(180deg); }
  .lgroupLink { cursor: pointer; }
  .lgroupLink:active { transform: scale(.98); }
  .lgroupLink .chev.play { transform: none; color: var(--blue); font-size: .95em; }
  .lgroup .btnGrid { width: auto; padding: 1.2vh; gap: 1.2vh 1vw; }
  .lgroup:not(.open) .btnGrid { display: none; }
  /* drill-down: once a group is opened, hide the other tiles so only its lessons show */
  .homeCard.subOpen .lgroup:not(.open) { display: none; }
  .homeCard.subOpen .lgroup.open .groupHead { display: none; }   /* page title already names the group */
  .homeCard.subOpen .lgroup.open { border: none; background: none; }
  .lgroupFun .groupHead { background: linear-gradient(#ffdf8a, #f0b53a); }   /* the playful parity tile */
  /* — file-cabinet folder: the flap swings open to reveal the lessons inside — */
  .lgroup.open { background: rgba(255,252,240,.6); }
  .lgroup.open .groupHead { border-bottom-left-radius: 0; border-bottom-right-radius: 0;
    background: linear-gradient(#f2d896, #e2bc6c); box-shadow: 0 3px 6px rgba(60,45,15,.18); }
  .lgroup.open .btnGrid { transform-origin: top center;
    animation: folderOpen .55s cubic-bezier(.2, 1.25, .4, 1);
    max-height: 46vh; overflow-y: auto; overscroll-behavior: contain; }
  .lgroup.open .btnGrid::-webkit-scrollbar { width: 8px; }
  .lgroup.open .btnGrid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 999px; }
  @keyframes folderOpen {
    0%   { transform: perspective(700px) rotateX(-72deg); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: perspective(700px) rotateX(0deg); opacity: 1; }
  }
  .lgroup.open .btnGrid .modeBtn { animation: folderItem .45s ease-out both; }
  .lgroup.open .btnGrid .modeBtn:nth-child(1) { animation-delay: .10s; }
  .lgroup.open .btnGrid .modeBtn:nth-child(2) { animation-delay: .16s; }
  .lgroup.open .btnGrid .modeBtn:nth-child(3) { animation-delay: .22s; }
  .lgroup.open .btnGrid .modeBtn:nth-child(4) { animation-delay: .28s; }
  .lgroup.open .btnGrid .modeBtn:nth-child(5) { animation-delay: .34s; }
  .lgroup.open .btnGrid .modeBtn:nth-child(n+6) { animation-delay: .40s; }
  @keyframes folderItem {
    0%   { transform: translateY(-14px) scale(.85); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { .lgroup.open .btnGrid, .lgroup.open .btnGrid .modeBtn { animation: none !important; } }
  .homeCard.lessonsOpen #chooseBtn .chev { transform: rotate(180deg); }

  /* ===== In-card challenge layouts: target on top, its picture underneath ===== */
  .itemCol, .phonCol { display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: .4vh; max-width: 100%; text-align: center; }
  .itemCol .bigletter { line-height: 1; }
  .itemCol .swatch, .itemCol .glyph { margin-top: .4vh; }
  .phonCol .phonLetter { line-height: 1; }
  .phonCol .phonWord { max-width: 100%; white-space: normal; text-align: center; line-height: 1.15; }
  .spellPic { text-align: center; line-height: 1; margin-top: .6vh; font-size: 8vh; }
  .listenPic { font-size: 16vh; }

  /* ===== Level-complete buttons + performance lines ===== */
  .winMist { font-weight: 800; color: #7a5a2e; }
  .winVerdict { font-weight: 800; color: var(--blue); max-width: 34em; line-height: 1.25; }
  .winBtns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 1vh; }
  .winBtn { cursor: pointer; border: 3px solid var(--gold); border-radius: 999px;
    background: linear-gradient(180deg, #ffd977, #f0b73c); color: #5b4327;
    font-family: 'Baloo 2', Georgia, serif; font-weight: 800; font-size: clamp(15px, 1.5vw, 22px);
    padding: 1vh 2.6vw; box-shadow: 0 5px 0 #b8862a, 0 8px 14px rgba(60,45,15,.3);
    transition: transform .12s ease, box-shadow .12s ease; }
  .winBtn:hover { transform: translateY(-2px); }
  .winBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8862a; }
  .winBtn.alt { background: linear-gradient(180deg, #9ecdf0, #5ea0d6); border-color: #cfe6f7; box-shadow: 0 5px 0 #2f6fb0, 0 8px 14px rgba(20,45,75,.3); color: #123a5e; }
  /* ===== Compact controls: lesson chooser, then Language + Narrator pickers on one line ===== */
  .homeControls { display: flex; flex-direction: column; align-items: stretch; gap: 1.1vh; width: 100%; }
  .homeControls #chooseBtn { align-self: stretch; }
  .pickRow { display: flex; gap: clamp(8px, 1.4vw, 16px); justify-content: center; align-items: stretch; }
  .picker { position: relative; flex: 1 1 0; min-width: 0; }
  .pickBtn { width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5em;
    background: rgba(255,255,255,.55); border: 2px solid rgba(217,195,138,.9); border-radius: 16px;
    padding: .8vh .6em; font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #8a6a35;
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease; }
  .pickBtn:active { transform: scale(.96); }
  .pickBtn .pkCap { text-transform: uppercase; letter-spacing: .12em; font-size: clamp(9px, .82vw, 11px); }
  .pickBtn .pkVal { font-size: clamp(22px, 2.2vw, 30px); line-height: 1; transition: transform .18s cubic-bezier(.2,1.6,.4,1); }
  .pickBtn .chev { font-size: .8em; transition: transform .2s ease; }
  .pickBtn.open { background: #fff7df; box-shadow: 0 4px 12px rgba(60,45,15,.28); }
  .pickBtn.open .chev { transform: rotate(180deg); }
  .pkVal.bump { animation: pkPop .45s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pkPop { 0% { transform: scale(1); } 45% { transform: scale(1.5) rotate(-8deg); } 100% { transform: scale(1); } }
  /* the option popover under each picker */
  /* fixed so it escapes the scrolling card; JS places it just below the picker button */
  .pickPop { position: fixed; left: 50%; top: auto; bottom: auto;
    transform: translateX(-50%) scale(.8); transform-origin: top center;
    z-index: 30; display: grid; grid-auto-flow: column; gap: 6px; padding: 8px;
    background: #fff7e6; border: 3px solid var(--gold); border-radius: 16px;
    box-shadow: 0 12px 26px rgba(60,45,15,.4); opacity: 0; pointer-events: none;
    transition: opacity .16s ease, transform .16s cubic-bezier(.2,1.5,.4,1); }
  .pickPop.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
  .pickPop::before { content: ''; position: absolute; top: -8px; bottom: auto; left: 50%; transform: translateX(-50%);
    border: 7px solid transparent; border-bottom-color: var(--gold); }
  .pickPop button { cursor: pointer; border: 3px solid transparent; border-radius: 12px; background: rgba(255,255,255,.6);
    line-height: 1; padding: 6px 8px; font-size: clamp(22px, 2.2vw, 30px);
    transition: transform .12s ease, border-color .12s ease, background .12s ease; }
  .pickPop button:hover { transform: translateY(-2px); }
  .pickPop button:active { transform: scale(.9); }
  .pickPop button.sel { border-color: var(--gold); background: #ffefc0; box-shadow: inset 0 0 0 2px rgba(255,255,255,.7); }
  /* narrator name tooltip — pops up ABOVE the character with a springy animation */
  .personaBtn { position: relative; }
  .personaBtn::after { content: attr(data-name); position: absolute; left: 50%; bottom: calc(100% + 10px);
    transform: translateX(-50%) translateY(8px) scale(.7); transform-origin: bottom center;
    background: var(--gold-d); color: #fff; font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 14px; letter-spacing: .3px; padding: 3px 12px; border-radius: 999px; white-space: nowrap;
    opacity: 0; pointer-events: none; z-index: 6; box-shadow: 0 5px 12px rgba(60,45,15,.4);
    transition: opacity .16s ease, transform .28s cubic-bezier(.2,1.7,.4,1); }
  .personaBtn::before { content: ''; position: absolute; left: 50%; bottom: calc(100% + 3px);
    transform: translateX(-50%) translateY(8px) scale(.7); border: 6px solid transparent; border-top-color: var(--gold-d);
    opacity: 0; pointer-events: none; z-index: 6; transition: opacity .16s ease, transform .28s cubic-bezier(.2,1.7,.4,1); }
  .personaBtn:hover::after, .personaBtn:focus-visible::after,
  .personaBtn:hover::before, .personaBtn:focus-visible::before { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  /* returning-player chip */
  .profileChip { display: flex; align-items: center; gap: .6em; align-self: center;
    background: linear-gradient(#fff7df, #f3e2b0); border: 3px solid var(--gold); border-radius: 999px;
    padding: .5vh 1em; box-shadow: 0 4px 10px rgba(60,45,15,.25); animation: cardIn .5s ease-out both; }
  .profileChip[hidden] { display: none; }
  .profileChip .pcAvatar { font-size: 1.5em; line-height: 1; }
  .profileChip .pcText { display: flex; flex-direction: column; line-height: 1.05; }
  .profileChip .pcHi { font-size: .72em; color: #8a6a35; font-weight: 700; }
  .profileChip .pcName { font-family: 'Baloo 2'; font-weight: 800; color: var(--blue-d); font-size: 1.05em; }
  .profileChip .pcStars { font-weight: 800; color: #b8860b; margin-left: .2em; }
  .profileChip .pcSwitch { cursor: pointer; border: none; background: rgba(0,0,0,.06); color: #6e4f24;
    border-radius: 999px; padding: .3em .7em; font-size: .72em; font-weight: 700; }
  .profileChip .pcSwitch:active { transform: scale(.94); }
  /* Yako (opaque, clean cutout) on the right, behind the menu so he can't overlap it */
  /* Yako waves & the puppy wags its tail — a transparent PNG sprite sheet (40 frames)
     stepped by CSS, ping-ponged with 'alternate' for a seamless loop. */
  .homeChar { position: fixed; right: 0; bottom: 0; z-index: 1; pointer-events: none;
    height: 52vh; width: calc(52vh * 0.7037);
    background-image: url('ui/yako_wave.png'); background-repeat: no-repeat;
    background-size: 4000% 100%; background-position: 0% 0%;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    animation: charIn .8s ease-out both,
               yakoWave 3.4s steps(39) .8s infinite alternate,
               charBob 4.5s ease-in-out .8s infinite; }
  .homeUI { margin-left: 0; }
  /* Desktop: a single NARROW, centered card (phone-style) — START never grows
     wider than the name field. Yako + puppy sit bottom-right, clear of the card. */
  @media (min-width: 761px) {
    #start { justify-content: center; }
    .homeUI { max-width: none; }
    .homeCard { width: min(440px, 92vw); max-height: 66vh; }   /* room for the big desktop title above + foot ribbon below */
    .homeChar { height: 58vh; width: calc(58vh * 0.7037); right: 1vw; }
  }
  @media (min-width: 761px) and (min-aspect-ratio: 16/9) {
    .homeChar { height: 64vh; width: calc(64vh * 0.7037); }
  }

  /* ---- Living storybook: gentle idle animations + an intro on load ---- */
  @keyframes charIn   { from { transform: translateX(45%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes charBob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.1vh); } }
  @keyframes yakoWave { from { background-position-x: 0%; } to { background-position-x: 100%; } }
  @keyframes titleIn { 0% { transform: translateY(-28px) scale(.8); opacity: 0; } 60% { transform: translateY(0) scale(1.07); } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes cardIn  { from { transform: translateY(42px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes ribbonIn{ 0% { transform: scale(.6); opacity: 0; } 70% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes iconBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .homeTitle  { animation: titleIn .8s cubic-bezier(.2,1.5,.4,1) both; }
  .homeRibbon { animation: ribbonIn .7s cubic-bezier(.2,1.5,.4,1) .45s both; }
  /* fill-mode backwards (NOT both): a retained end-transform would make the card the
     containing block for the fixed picker popovers — mispositioning and clipping them */
  .homeCard   { animation: cardIn .7s ease-out .2s backwards; }
  #start .btnGrid .modeBtn .icons { animation: iconBob 2.4s ease-in-out infinite; display: inline-block; }
  #start .btnGrid .modeBtn:nth-child(2) .icons { animation-delay: .2s; }
  #start .btnGrid .modeBtn:nth-child(3) .icons { animation-delay: .4s; }
  #start .btnGrid .modeBtn:nth-child(4) .icons { animation-delay: .6s; }
  #start .btnGrid .modeBtn:nth-child(5) .icons { animation-delay: .8s; }
  #start .btnGrid .modeBtn:nth-child(6) .icons { animation-delay: 1s; }
  #start .btnGrid .modeBtn:nth-child(7) .icons { animation-delay: .3s; }
  #start .btnGrid .modeBtn:nth-child(8) .icons { animation-delay: .5s; }
  #start .btnGrid .modeBtn:nth-child(9) .icons { animation-delay: .7s; }
  #start .modeBtn[data-mode="free"] .sub { animation: iconBob 2.2s ease-in-out .3s infinite; display: inline-block; }
  @media (prefers-reduced-motion: reduce) { .homeChar,.homeTitle,.homeRibbon,.homeCard,.modeBtn .icons,.modeBtn .sub { animation: none !important; } }
  /* CSS pill (real text) instead of a stretched PNG — never distorts as the window grows */
  .homeFoot { position: fixed; bottom: 1.4vh; left: 50%; transform: translateX(-50%); z-index: 2;
    width: auto; max-width: 94vw; height: auto;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 8px 26px; box-sizing: border-box;
    background: linear-gradient(#f7e4b4, #e7c884);
    border: 4px solid var(--gold); border-radius: 999px;
    box-shadow: 0 6px 16px rgba(60,45,15,.32), inset 0 0 0 3px rgba(255,255,255,.45);
    font-family: 'Baloo 2', sans-serif; color: #6e4f24; text-shadow: 0 1px 0 rgba(255,255,255,.5);
    white-space: nowrap; }
  .homeFoot .footIcon { font-size: clamp(16px, 1.9vw, 26px); line-height: 1; flex: 0 0 auto;
    filter: drop-shadow(0 1px 1px rgba(90,60,15,.35)); }
  .homeFoot .footText { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
  .homeFoot .footText b  { font-weight: 800; font-size: clamp(12px, 1.5vw, 19px); }
  .homeFoot .footText em { font-style: normal; font-weight: 600; font-size: clamp(11px, 1.3vw, 16px); color: #8a6a36; }
  /* Media player merged into the foot ribbon (play/pause + next song) */
  .homeFoot .footMusic { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .homeFoot .mBtn { flex: 0 0 auto; width: clamp(30px, 3.2vw, 38px); height: clamp(30px, 3.2vw, 38px);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(13px, 1.5vw, 17px); line-height: 1; cursor: pointer;
    background: #fff6e0; color: #6e4f24; border: 2px solid var(--gold-d); border-radius: 50%;
    box-shadow: 0 2px 4px rgba(90,60,15,.25); transition: transform .1s ease, background .15s ease; }
  .homeFoot .mBtn:hover { background: #fffaf0; }
  .homeFoot .mBtn:active { transform: scale(.9); }
  .homeFoot .mPlay { background: linear-gradient(#ffe9a8, #f0c869); }
  .homeFoot .mBtn svg { width: 54%; height: 54%; fill: #6e4f24; display: block; pointer-events: none; }
  .homeFoot .footText em { transition: opacity .35s ease; }
  .homeFoot.subswap .footText em { opacity: 0; }
  /* 🥚 secret seashell: a quietly-tappable Easter egg that flips the playlist.
     Tapping it colors the shell; tapping again returns it to normal. */
  #footShell { cursor: pointer; user-select: none; -webkit-user-select: none;
    display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;
    width: 1.7em; height: 1.7em; aspect-ratio: 1; padding: 0; border-radius: 50%;   /* square box → the active ring is a true circle, not a rounded square */
    transition: transform .12s ease, background .25s ease, box-shadow .25s ease; }
  #footShell:active { transform: scale(.85); }
  .shellPop { animation: shellPop .55s cubic-bezier(.2,1.6,.4,1); }
  @keyframes shellPop { 0% { transform: scale(1) rotate(0); } 40% { transform: scale(1.55) rotate(-20deg); } 100% { transform: scale(1) rotate(0); } }
  .homeFoot.secret #footShell {          /* active: the shell turns rainbow-colorful */
    background: conic-gradient(from 0deg, #ff8fb1, #ffd36e, #8fe3a0, #7cc4ff, #c79cff, #ff8fb1);
    box-shadow: 0 0 0 2px #fff, 0 0 12px 3px rgba(160,90,220,.6); }
  /* The painted home menu, scaled to fit; hotspots positioned in % of the image */
  .homeStage { position: relative; }
  .homeStage img.bg { display: block; max-width: 100vw; max-height: 100vh; width: auto; height: auto;
    transform-origin: 60% 70%; animation: homeBreathe 11s ease-in-out infinite alternate; }
  @keyframes homeBreathe {
    0%   { transform: scale(1.0)   translateY(0); filter: brightness(1); }
    50%  { transform: scale(1.012) translateY(-0.4%); filter: brightness(1.03); }
    100% { transform: scale(1.022) translateY(-0.8%); filter: brightness(1); }
  }

  #freecard { position: fixed; left: 50%; top: 42%; transform: translate(-50%, -50%); z-index: 5;
    display: none; }

  #freecard .freecardImg { display: block; width: min(68vw, 82vh); height: auto;

    filter: drop-shadow(0 14px 30px rgba(0,0,0,.4)); }
  #freeLetter { position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center; background: transparent;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; color: var(--blue);
    font-size: min(22vh, 34vw); line-height: 1; box-sizing: border-box;
    overflow: visible; }
  /* moving sun-glint shimmer over the painted sea (suggests rolling waves) */
  .seaShimmer {
    position: absolute; left: 53%; top: 8%; width: 47%; height: 44%; pointer-events: none;
    opacity: .4; mix-blend-mode: screen;
    background: repeating-linear-gradient(112deg,

    background-size: 220% 100%;
    animation: seaRoll 7s linear infinite;

  .homeStage .hotspot {

  /* the name field sits over the painted "Jake" box and covers it */

  /* --- calibrated positions (% of the home image) --- */

  /* Crisp kit button artwork laid over the painted buttons, with press states */
  .homeStage .modeBtn {

  .homeStage .modeBtn[data-mode="both"]    { background-image: url('ui/both.png'); }
  .homeStage .modeBtn[data-mode="shapes"]  { background-image: url('ui/shapes.png'); }

  /* painted toggles kept; a gold ring marks the selected one */

  .logo { font-family: 'Baloo 2'; font-weight: 800; font-size: 4.8vw; line-height: 1; margin: 0;

  .startCard { padding: 1.4vh 3vw; display: flex; flex-direction: column; gap: 1.1vh; align-items: center; }

  /* picture + starting-letter row (First-letter answer style) */
  .itemRow { display: flex; align-items: center; justify-content: center; gap: 2.5vw; max-width: 90%; }
  .glyph { font-size: min(20vh, 24vw); line-height: 1; filter: drop-shadow(0 8px 18px rgba(0,0,0,.3)); }
  .arrow { font-size: min(8vh, 7vw); color: var(--gold-d); }
  .bigletter { font-size: min(22vh, 26vw); font-weight: 800; line-height: 1; }
  .itemRow .swatch { width: min(18vh, 22vw); height: min(18vh, 22vw); }
  /* Spelling / Counting word tiles */
  .spellRow { display: flex; align-items: center; justify-content: center; gap: min(2vh, 2vw); flex-wrap: nowrap; max-width: 96%; }
  .spellRow .sl { font-family: 'Baloo 2', sans-serif; font-weight: 800; line-height: 1;

  /* give the multi-tile word room inside the painted desktop card */
  #game.seq-mode .gameStage #target { left: 27%; width: 50%; top: 26%; height: 32%; font-size: inherit; }

  /* Letter Sounds (phonics) */
  .phonRow { display: flex; align-items: center; justify-content: center; gap: .35em; }
  .phonLetter { font-family: 'Baloo 2', sans-serif; font-weight: 800; color: var(--blue); line-height: 1; font-size: min(16vh, 16vw); }
  .phonPic { font-size: min(12vh, 12vw); }
  .phonWord { text-align: center; font-family: 'Baloo 2', sans-serif; font-weight: 700; color: #5b4327; font-size: min(4vh, 5vw); margin-top: .15em; }
  /* How Many? + Add & Subtract object groups */
  .countObjRow, .mathRow { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: .12em; max-width: 96%; line-height: 1; }

  .mathRow .grp { display: inline-flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: .08em; }
  .mathRow .mop, .mathRow .meq { font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #5b4327; font-size: min(9vh, 9vw); margin: 0 .14em; }
  .mathRow .mq { font-family: 'Baloo 2', sans-serif; font-weight: 800; color: var(--blue); font-size: min(12vh, 12vw); }
  /* widen the painted desktop card so object groups fit */
  #game.big-target .gameStage #target { left: 25%; width: 50%; top: 25%; height: 34%; font-size: inherit; }
  /* hidden-answer placeholder (shown until the hint reveals it) */
  .answerSlot, #target .bigQ { color: #c4b083 !important; }

  /* Yako character images (real artwork, with emoji fallback) */
  #yako .yakoChar { height: 17vh; border-radius: 18px; border: 4px solid var(--gold);
    box-shadow: 0 8px 16px rgba(0,0,0,.3); object-fit: cover; }
  #buddy img.buddyFace { height: 1em; border-radius: 16px; border: 5px solid var(--gold);
    box-shadow: 0 8px 16px rgba(0,0,0,.35); }

  .swatch {
    width: min(20vh,22vw); height: min(20vh,22vw); border-radius: 22%;
    box-shadow: inset 0 -10px 24px rgba(0,0,0,.25), inset 0 8px 18px rgba(255,255,255,.4), 0 6px 16px rgba(0,0,0,.25);
  }

  /* numbered multiple-choice chips */
  #choices {
    position: fixed; bottom: 13vh; width: 100%; display: none; gap: 2.2vw;
    justify-content: center; align-items: center; flex-wrap: wrap; z-index: 5;
  }
  #game.choices-mode #choices { display: flex; }
  .choice {
    display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
    background: var(--parch); border: 5px solid var(--gold); border-radius: 22px;
    padding: 1.2vh 1.8vw; min-width: 11vw; box-shadow: 0 8px 20px rgba(60,45,15,.28);
    transition: border-color .15s, background .15s, transform .15s;
  }
  .choice .num { font-size: 3.2vw; font-weight: 800; color: var(--blue); line-height: 1; }
  .choice .glyph { font-size: 5vw; line-height: 1; filter: none; }
  .choice .swatch { width: 5vw; height: 5vw; }
  .choice .nm { font-size: 1.6vw; color: var(--ink); font-weight: 600; }
  .choice.correct { border-color: #2bb673; background: #d9f5e3; transform: scale(1.06); }
  .choice.wrong   { border-color: #e0466b; background: #fbdde3; }
  #game.choices-mode #target { top: 38%; min-height: 16vh; font-size: 16vh; }
  #game.choices-mode #target .swatch { width: min(15vh,18vw); height: min(15vh,18vw); }
  #game.choices-mode #target .glyph { font-size: min(15vh,18vw); }

  /* ---------- Language Island: flags, digit clusters, and the listen-again speaker ---------- */
  .choice .flagBig { font-size: 4.6vw; line-height: 1; }
  .choice .sdBig   { font-size: 4vw; line-height: 1; }
  .choice .clusterChoice { display: flex; flex-wrap: wrap; gap: .25vw; justify-content: center;
    align-items: center; max-width: 15vw; font-size: 2.2vw; line-height: 1.05; }
  .listenCol { display: flex; flex-direction: column; align-items: center; gap: 1.2vh; }
  .listenObj { font-size: min(13vh,16vw); line-height: 1; }
  .listenObj .swatch { width: min(13vh,16vw); height: min(13vh,16vw); border-radius: 20px; }
  .listenObj .glyph { font-size: min(13vh,16vw); }
  .listenObj .bigGlobe, .listenObj .bigEar, .listenObj .bigCount { font-size: min(12vh,15vw); }
  .speakerBtn { cursor: pointer; border: 5px solid var(--gold); border-radius: 999px;
    background: radial-gradient(circle at 40% 35%, #fff8e6, #f2dca0); color: #6e4f24;
    width: min(13vh,16vw); height: min(13vh,16vw); font-size: min(6.5vh,8vw); line-height: 1;
    box-shadow: 0 8px 20px rgba(60,45,15,.32), inset 0 0 0 3px rgba(255,255,255,.5);

  .speakerBtn:active { transform: scale(.92); }
  @keyframes speakerPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
  /* the six Language Island lesson buttons share a teal hue */
  #start .modeBtn.lang { --bg: #0f9aa6; }
  #start .modeBtn.adv  { --bg: #4a8c4f; }
  #start .modeBtn.music { --bg: #b5468f; }
  /* Music lesson: coloured note buttons + note/chord target */
  #choices .noteBtn { --nbg: #888; min-width: 0; width: min(9.5vh, 11.5vw); height: min(9.5vh, 11.5vw); padding: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .05em;
    background: radial-gradient(circle at 40% 32%, color-mix(in srgb, var(--nbg), #fff 30%), var(--nbg));
    border: 3px solid #fff; border-radius: 50%; box-shadow: 0 5px 0 color-mix(in srgb, var(--nbg), #000 35%), 0 9px 14px rgba(34,21,4,.25); }
  #choices .noteBtn .noteLtr { font-family: Georgia, serif; font-weight: 900; color: #fff; line-height: 1;
    font-size: min(4.6vh, 6vw); text-shadow: 2px 2px 0 rgba(35,22,8,.55); }
  #choices .noteBtn .noteMark { font-size: min(1.8vh, 2.6vw); color: rgba(255,255,255,.85); line-height: 1; }
  #choices { gap: 1.6vw; }   /* tighter so all 7 notes fit a row */
  #choices .noteBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 color-mix(in srgb, var(--nbg), #000 35%); }
  #target .noteBig  { font-family: Georgia, serif; font-weight: 900; font-size: min(18vh, 24vw); line-height: 1; }
  #target .noteGlyph { font-size: min(15vh, 20vw); line-height: 1; }
  /* the bagpiper who plays the note (Pebble Beach) */
  #target .piperWrap { display: flex; flex-direction: column; align-items: center; gap: .6vh; }
  #target .piperImg { width: min(15vh, 22vw); height: auto; filter: drop-shadow(0 5px 8px rgba(50,30,5,.4));
    transform-origin: 50% 90%; animation: piperPlay 1.6s ease-in-out infinite; }
  @keyframes piperPlay { 0%,100% { transform: rotate(-2.5deg); } 50% { transform: rotate(2.5deg) translateY(-3%); } }
  #target .piperWrap.noimg::before { content: '🎼'; font-size: min(12vh, 16vw); line-height: 1; }
  #target .piperWrap .noteBig { font-size: min(9vh, 13vw); }     /* note shown smaller beside the piper */
  #target .piperWrap .noteGlyph { font-size: min(8vh, 12vw); }
  #target .chordCard { display: flex; flex-direction: column; align-items: center; gap: 1.4vh; }
  #target .chordName { font-family: 'Baloo 2'; font-weight: 900; color: var(--blue); font-size: min(5vh, 8vw); }
  #target .chordRow { display: flex; gap: min(2vh, 3vw); }
  #target .chordRow .cn { font-family: Georgia, serif; font-weight: 900; color: #fff; line-height: 1;
    width: min(9vh, 13vw); height: min(9vh, 13vw); display: flex; align-items: center; justify-content: center;
    font-size: min(5vh, 7vw); border-radius: 16px; border: 3px solid #fff; background: #c9b48a;
    box-shadow: 0 4px 8px rgba(34,21,4,.25); text-shadow: 2px 2px 0 rgba(35,22,8,.5); }
  #target .chordRow .cn.done { background: radial-gradient(circle at 40% 32%, color-mix(in srgb, var(--nbg), #fff 30%), var(--nbg)); }
  #target .chordRow .cn.now  { background: #f0d9a0; color: #6e4f24; text-shadow: none; animation: nowPulse 1.2s ease-in-out infinite; }
  @keyframes nowPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #target .chordReplay { margin-top: .6vh; }

  /* ---------- Monterey Adventures: a painted location scene as the backdrop ---------- */
  #sceneBg { position: fixed; inset: 0; z-index: 0; display: none;
    width: 100%; height: 100%; object-fit: cover; object-position: center bottom; }
  #game.adv #sceneBg { display: block; }
  /* soft vignette over the living scene so the cream card stays crisp and readable */
  #sceneScrim { position: fixed; inset: 0; z-index: 0; display: none; pointer-events: none;
    background: radial-gradient(ellipse 82% 72% at 50% 45%, rgba(0,0,0,0) 42%, rgba(18,12,3,.38) 100%); }
  #game.adv #sceneScrim { display: block; }
  #game.adv .gameStage .bg { display: none; }                 /* hide the painted desk frame */
  #game.adv #gameRibbon, #game.adv #reactionBox { display: none; }
  /* readable cream card centered over the scene (works at every width) */
  #game.adv #panel { position: absolute; left: 50%; top: 13%; transform: translateX(-50%);
    width: min(560px, 88vw); height: auto; min-height: 26vh; max-height: 52vh; padding: 2.4vh 2.4vw;
    background: linear-gradient(rgba(247,233,197,.95), rgba(239,220,171,.95));
    border: 6px solid var(--gold); border-radius: 26px; overflow: hidden;
    box-shadow: 0 16px 34px rgba(40,30,10,.5), inset 0 0 0 3px rgba(255,255,255,.55);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.4vh; pointer-events: none; }
  #game.adv #panel #prompt { position: static; left: auto; top: auto; width: auto; transform: none;
    font-family: 'Baloo 2'; font-weight: 800; font-size: min(3.8vh, 6.6vw); line-height: 1.1;
    color: #5b4327; text-shadow: 0 2px 2px rgba(255,255,255,.6); z-index: 2; }
  #game.adv #panel #target { position: static; left: auto; top: auto; width: 100%; height: auto; transform: none;
    display: flex; align-items: center; justify-content: center; font-size: inherit; text-shadow: none; }
  #game.adv .advCount { display: flex; flex-wrap: wrap; gap: 1vh 1.2vw; align-items: center; justify-content: center; max-width: 100%; }
  #game.adv .advCount .cobj { font-size: min(8.5vh, 12vw); line-height: 1; }
  #game.adv #choices { position: fixed; top: auto; bottom: 11vh; left: 0; width: 100%; }
  #game.adv #choices .choice .num { font-size: min(5.5vh, 8vw); font-weight: 900; }
  #game.adv #choices .choice { min-width: min(16vh, 22vw); padding: 1.4vh 2vw; }
  #game.adv #choices .noteBtn { min-width: 0; padding: 0; width: min(9.5vh, 12vw); height: min(9.5vh, 12vw); }   /* keep note buttons round in scene layout */
  /* visible round Home + Sound buttons (the painted hotspots are hidden with the frame) */
  /* Icons are inline SVG background images (not emoji glyphs — those inherit the
     invisible-hotspot transparent color on some platforms and vanish). */
  #game.adv #exit, #game.adv #sound { position: fixed; bottom: 2.5vh; top: auto; width: min(8vh,13vw); height: min(8vh,13vw);
    border-radius: 50%; background-color: var(--blue); background-repeat: no-repeat; background-position: center; background-size: 52%;
    border: 3px solid var(--blue-d); box-shadow: 0 5px 12px rgba(0,0,0,.4); z-index: 12; }
  #game.adv #exit  { left: 3vw; right: auto;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M12 3 2.4 11h2.7v8.4h4.2v-5h5.4v5h4.2V11H21.6z'/></svg>"); }
  #game.adv #sound { right: 3vw; left: auto;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M3 9v6h4l5 4V5L7 9H3z'/><path fill='none' stroke='white' stroke-width='2' stroke-linecap='round' d='M15.5 8.6a4.6 4.6 0 0 1 0 6.8M18.2 6a8 8 0 0 1 0 12'/></svg>"); }
  /* Just-for-Fun home button (Free Play hides the painted frame, so it needs its own) */
  #freeHome { position: fixed; left: 3vw; bottom: 2.5vh; z-index: 7; display: none;
    width: min(8vh,13vw); height: min(8vh,13vw); align-items: center; justify-content: center;
    font-size: min(3.8vh,6vw); line-height: 1; cursor: pointer;
    background: #fff6e0; color: #6e4f24; border: 3px solid var(--gold-d); border-radius: 50%;
    box-shadow: 0 5px 12px rgba(0,0,0,.32); }
  #freeHome:active { transform: scale(.92); }
  #game.free-mode #freeHome { display: flex; }
  #game.adv #exit::after, #game.adv #sound::after { content: none; }   /* icon comes from the SVG background */
  #game.adv #sound.muted { background-color: #c0392b; border-color: #9a261a;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M3 9v6h4l5 4V5L7 9H3z'/><path fill='none' stroke='white' stroke-width='2' stroke-linecap='round' d='M16 9l6 6M22 9l-6 6'/></svg>"); }
  /* two-slider volume panel (Music + Voice), above the in-game player */
  /* audio mixer — appears above the round Sound button (bottom-right): mute + faders */
  #volPop { position: fixed; right: 2vw; bottom: calc(2.5vh + min(8vh,13vw) + 12px); z-index: 45;
    display: none; flex-direction: column; gap: 8px; padding: 10px 14px;
    background: #fff7e6; border: 3px solid var(--gold); border-radius: 16px;
    box-shadow: 0 10px 22px rgba(60,45,15,.4);
    opacity: 0; pointer-events: none; transform: translateY(8px) scale(.9); transform-origin: bottom right;
    transition: opacity .16s ease, transform .16s cubic-bezier(.2,1.5,.4,1); }
  #game #volPop { display: flex; }              /* only meaningful in-game */
  #volPop.show { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
  #volPop .volMute { cursor: pointer; font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 14px;
    color: #6e4f24; background: #ffe9a8; border: 2px solid var(--gold-d); border-radius: 999px; padding: 5px 10px; }
  #volPop .volMute.muted { background: #f3c0b6; }
  #volPop .volRow { display: flex; align-items: center; gap: 8px; }
  #volPop .vIco { font-size: 16px; line-height: 1; width: 1.3em; text-align: center; }
  #volMusic, #volVoice { width: min(180px, 46vw); accent-color: var(--gold-d); cursor: pointer; }
  /* in-game media player — bottom center of every level page */
  #gamePlayer { position: fixed; left: 50%; bottom: 2.5vh; transform: translateX(-50%); z-index: 12;
    display: flex; align-items: center; gap: 10px; padding: 5px 12px;
    background: linear-gradient(#f7e4b4, #e7c884); border: 3px solid var(--gold); border-radius: 999px;

  #gamePlayer .gpBtn { flex: 0 0 auto; width: min(6.4vh, 10.5vw); height: min(6.4vh, 10.5vw);

  #gamePlayer .gpBtn:active { transform: scale(.9); }

  #volSlider { width: min(160px, 34vw); accent-color: var(--gold-d); cursor: pointer; }
  /* ----- scene layout now hosts EVERY lesson: size the card target + on-screen keyboard ----- */
  #game.adv #panel #target { font-size: min(15vh, 20vw); color: var(--blue); }
  #game.adv #panel #target .bigletter { font-size: min(15vh, 20vw); }
  #game.adv #panel #target .glyph { font-size: min(13vh, 17vw); }
  #game.adv #panel #target .swatch { width: min(13vh,17vw); height: min(13vh,17vw); border-radius: 18px; }
  #game.adv #panel #target .spellRow { display: flex; gap: 1.2vw; flex-wrap: nowrap; justify-content: center;

  #game.adv #panel #target .spellRow .sl { font-size: min(8vh, 11vw); flex: 0 0 auto; }
  #game.adv #panel #target .spellPic, #game.adv #panel #target .listenPic { font-size: min(11vh, 15vw); }
  #game.adv #panel #target .phonLetter { font-size: min(12vh,16vw); }
  #game.adv #panel #target .phonPic { font-size: min(11vh,15vw); }
  #game.adv #panel #target .countObjRow, #game.adv #panel #target .mathRow { display: flex; flex-wrap: wrap; gap: .6vh .8vw; align-items: center; justify-content: center; font-size: min(7vh,10vw); }
  #game.adv #mfb, #game.adv #fbGood, #game.adv #fbBad { display: none; }   /* card + confetti + voice give feedback */
  /* on-screen keyboard as a tidy bottom bar (letters- or numbers-only, no modifier rows) */
  #game.adv #keyboard { position: fixed; left: 50%; bottom: 13vh; top: auto; transform: translateX(-50%);

  #game.adv #keyboard .krow { gap: .8vw; }

  #game.adv.num-answer #keyboard .krow:nth-child(3),
  #game.adv.num-answer #keyboard .krow:nth-child(4) { display: none; }         /* hide letters for number rounds */

  /* ===== Top status bar: location (left) · progress stars (center) · total (right) =====

    position: fixed; top: 1.5vh; z-index: 13; box-sizing: border-box;
    height: clamp(38px, 6vh, 52px); display: flex; align-items: center;
    border-radius: 999px; box-shadow: 0 4px 12px rgba(60,45,15,.26);
    font-family: 'Baloo 2', sans-serif; font-weight: 800; }
  /* location pill stacks the name over the thumbnail so it stays narrow and never

  #game.adv #placeTag { left: 2vw; right: auto; transform: none; height: auto; max-width: 30vw;
    flex-direction: column; align-items: center; gap: .3em; border-radius: 16px;
    padding: .5vh .7em; background: rgba(255,247,223,.94); border: 3px solid var(--gold);
    color: #6e4f24; font-size: min(2.1vh, 3.4vw); cursor: pointer; transition: transform .12s ease; }

  #game.adv #starbar .lvlStar { font-size: min(3vh, 4.6vw); }
  #game.adv #score { left: auto; right: 2vw; transform: none; gap: .3em; padding: 0 .85em;
    background: var(--blue); border: 3px solid #fff; color: #fff; font-size: min(2.6vh, 4.4vw); }
  #game:not(.adv) #placeTag, #game.free-mode #placeTag { display: none; }
  /* — the travel dropdown: opens directly below the place button (upper-left) — */
  #placePop { position: fixed; transform: scale(.85); transform-origin: top left;
    z-index: 40; display: flex; flex-direction: column; gap: 4px; padding: 8px;
    background: #fff7e6; border: 3px solid var(--gold); border-radius: 16px;

    border: 3px solid transparent; border-radius: 12px; background: rgba(255,255,255,.6);
    padding: 7px 14px; font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #6e4f24;
    font-size: min(2.2vh, 4vw); transition: transform .12s ease, border-color .12s ease; white-space: nowrap; }
  #placePop button:hover { transform: translateX(3px); }
  #placePop button.sel { border-color: var(--gold); background: #ffefc0; }
  #placePop button .pThumb { flex: 0 0 auto; width: 2.4em; height: 1.6em; object-fit: cover;
    border-radius: 7px; border: 2px solid var(--gold); box-shadow: 0 1px 3px rgba(60,45,15,.3); }
  /* — the Yako place card: a fun fact + what Yako loves to do here — */
  #placeCard { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 60;
    width: min(480px, 88vw); background: #fdf3d7; border: 5px solid var(--gold); border-radius: 22px;
    padding: 2.2vh 4vw 2.6vh; box-shadow: 0 18px 44px rgba(30,20,5,.5);
    display: flex; flex-direction: column; align-items: center; gap: 1vh; text-align: center;
    font-family: 'Baloo 2', sans-serif; animation: placeCardIn .4s cubic-bezier(.2,1.4,.4,1); }
  #placeCard[hidden] { display: none; }
  @keyframes placeCardIn { 0% { transform: translate(-50%, -50%) scale(.6); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
  /* a fresh painted view of the place, with Yako peeking up from just under it */
  #placeCard .pcScene { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
  #placeCard .pcSceneImg { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
    border-radius: 16px; border: 4px solid var(--gold); box-shadow: 0 8px 18px rgba(40,28,8,.35); background: #e9dcc0; }
  /* in normal flow (not absolute) so Yako can never sit on top of the title or fact text */
  #placeCard .pcYako { display: block; width: min(92px, 20vw); height: auto;
    margin-top: min(-26px, -6vw); position: relative; z-index: 1;
    filter: drop-shadow(0 5px 8px rgba(50,30,5,.45)); }
  #placeCard .pcPlace { font-weight: 900; color: var(--blue); font-size: min(3.4vh, 6vw); }
  #placeCard .pcFact  { font-weight: 700; color: #5b4327; font-size: min(2.3vh, 4.2vw); line-height: 1.3; }
  #placeCard .pcLoves { font-weight: 800; color: #b0722a; font-size: min(2.3vh, 4.2vw); line-height: 1.3; }
  #placeCard .pcX { position: absolute; top: -16px; right: -16px; z-index: 80; cursor: pointer;
    width: min(6vh, 46px); height: min(6vh, 46px); display: flex; align-items: center; justify-content: center;
    background: #fff; border: 3px solid var(--gold-d); border-radius: 50%; color: #6e4f24;
    font-size: min(3vh, 24px); font-weight: 900; line-height: 1; box-shadow: 0 4px 10px rgba(40,28,8,.45); }
  #placeCard .pcX:hover { background: #fff6e0; }
  #placeCard .pcX:active { transform: scale(.88); }

  /* ---------- On-screen keyboard ---------- */
  #keyboard {
    position: fixed; bottom: 7.5vh; left: 50%; transform: translateX(-50%); z-index: 4;
    width: min(72vw, 1040px); display: flex; flex-direction: column; gap: .7vh;
    background: var(--parch); border: 5px solid var(--gold); border-radius: 18px;
    padding: 1vh .8vw; box-shadow: 0 12px 28px rgba(60,45,15,.32);
  }
  #game.choices-mode #keyboard, #game.free-mode #keyboard { display: none; }
  .krow { display: flex; gap: .5vw; justify-content: center; }
  .key {
    flex: 1 1 0; min-width: 0; height: 5.4vh; display: flex; align-items: center; justify-content: center;
    font-size: 2vh; font-weight: 700; color: var(--ink);
    background: var(--parch2); border: 2px solid #ddc88f; border-radius: 9px;
    box-shadow: 0 2px 0 #cbb274;
  }
  .key.mod { color: #fff; background: var(--blue); border-color: var(--blue-d); box-shadow: 0 2px 0 var(--blue-d); font-size: 1.4vh; flex: 1.5 1 0; }
  .key.spacebar { flex: 7 1 0; }
  .key.active { cursor: pointer; }
  .key.active:active { transform: translateY(2px); box-shadow: none; }
  .key.near { background: #fff0c4; border-color: #e8c768; box-shadow: 0 0 10px #ffe39a, 0 2px 0 #d9bd6e; }
  .key.target { background: #ffe08a; border-color: #e0a93a; box-shadow: 0 0 16px #ffce5a, 0 2px 0 #d6a93a; animation: keyGlow 1.1s ease-in-out infinite alternate; }
  @keyframes keyGlow { from { box-shadow: 0 0 8px #ffce5a, 0 2px 0 #d6a93a; } to { box-shadow: 0 0 22px #ffce5a, 0 2px 0 #d6a93a; } }
  .key.hit-correct { background: #7bd88f; border-color: #2bb673; color: #0a5; }
  .key.hit-wrong { background: #f3a6a6; border-color: #e0466b; color: #b33; }

  /* ---------- Yako character ---------- */
  #yako {
    position: fixed; left: 1vw; bottom: 13vh; z-index: 4; font-size: 11vh; line-height: 1;
    pointer-events: none; filter: drop-shadow(0 8px 16px rgba(0,0,0,.3));
    animation: bob 1.8s ease-in-out infinite alternate;
  }
  #game.free-mode #yako { display: none; }

  /* feedback card (Great job! / Oops!) */
  #feedback {
    position: fixed; right: 1.5vw; top: 12vh; z-index: 7; width: 17vw; min-width: 180px;
    padding: 1.6vh 1.2vw; text-align: center; opacity: 0; transform: translateX(120%);
    transition: transform .4s cubic-bezier(.2,1.3,.4,1), opacity .3s;
    background: var(--parch); border: 5px solid var(--gold); border-radius: 22px;
    box-shadow: 0 10px 24px rgba(60,45,15,.3);
  }
  #feedback.show { opacity: 1; transform: translateX(0); }
  #feedback.good { border-color: #2bb673; }
  #feedback.bad  { border-color: #e0466b; }
  #feedback .fbFace { font-size: 7vh; display: block; }
  #feedback img.fbFace { width: 88%; height: auto; border-radius: 14px; margin: 0 auto .5vh; }
  #feedback .fbText { font-size: 1.9vw; font-weight: 800; }
  #feedback.good .fbText { color: #2bb673; }
  #feedback.bad  .fbText { color: #e0466b; }

  /* pops for wrong keys / free play */
  .pop {
    position: absolute; font-weight: 800; line-height: 1; pointer-events: none; z-index: 6;
    animation: pop 1.4s ease-out forwards; text-shadow: 0 0 12px rgba(255,255,255,.7), 0 3px 6px rgba(0,0,0,.35);
  }
  @keyframes pop {
    0%   { transform: translate(-50%,-50%) scale(.2); opacity: 0; }
    18%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
  }

  /* celebration burst */
  .confetti { position: absolute; width: 16px; height: 16px; border-radius: 3px; pointer-events: none; z-index: 7;
    animation: fall 1.6s ease-in forwards; }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(90vh) rotate(720deg); opacity: 0; }
  }

  /* cheering buddy (Yako jumps in) */
  #buddy {
    position: fixed; bottom: 5vh; z-index: 8; display: flex; align-items: flex-end; gap: 1vw;
    font-size: 18vh; pointer-events: none;
    transition: transform .55s cubic-bezier(.2, 1.3, .4, 1);
    filter: drop-shadow(0 12px 24px rgba(0,0,0,.4));
  }
  #buddy.left  { left: 2vw;  transform: translateX(-200%); }
  #buddy.right { right: 2vw; transform: translateX(200%); flex-direction: row-reverse; }
  #buddy.in { transform: translateX(0); }
  #buddy .buddyFace { display: inline-block; animation: buddyBob .5s ease-in-out infinite alternate; }
  #buddy .buddyGesture { display: inline-block; font-size: .68em; animation: gestureWiggle .32s ease-in-out infinite alternate; }
  @keyframes buddyBob { from { transform: translateY(0); } to { transform: translateY(-2.2vh) rotate(-3deg); } }
  @keyframes gestureWiggle { from { transform: rotate(-16deg) scale(.95); } to { transform: rotate(16deg) scale(1.12); } }

  /* round home / sound buttons */
  .roundBtn {
    position: fixed; bottom: 2vh; z-index: 8; width: 7vh; height: 7vh; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 3.4vh; cursor: pointer;
    background: var(--blue); color: #fff; border: 4px solid #fff; box-shadow: 0 6px 16px rgba(0,0,0,.3);
  }
  .roundBtn:active { transform: scale(.94); }
  #exit  { left: 2vw; }
  #sound { right: 2vw; }

  #hint {
    position: fixed; bottom: 1.4vh; left: 50%; transform: translateX(-50%); z-index: 5;
    text-align: center; color: var(--ink); font-size: 1.6vw; font-weight: 700;
    background: var(--parch); border: 3px solid var(--gold); border-radius: 999px; padding: .5vh 2vw;
    box-shadow: 0 6px 14px rgba(60,45,15,.25);
  }

  /* level-complete overlay */
  #win {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 9;
    background: rgba(20,50,70,.45); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  #win.show { display: flex; }
  .winCard {
    background: var(--parch); border: 7px solid var(--gold); border-radius: 34px;
    padding: 4vh 5vw; text-align: center; color: var(--ink);
    box-shadow: 0 22px 60px rgba(0,0,0,.45), inset 0 0 0 3px rgba(255,255,255,.4);
    animation: winPop .5s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes winPop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .winYako { display: block; width: min(26vh, 38vw); max-width: 240px; margin: -2vh auto 0; pointer-events: none;
    animation: winYakoJump .6s cubic-bezier(.2,1.6,.4,1) .15s both, winYakoBob 1.9s ease-in-out .8s infinite; }
  @keyframes winYakoJump { 0% { transform: translateY(40px) scale(.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes winYakoBob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .winTitle { font-size: 4vw; font-weight: 800; color: var(--blue); }
  .winStars { font-size: 7vw; color: #f4b73d; letter-spacing: .5vw; }
  .winTime, .winBest { font-size: 2.6vw; font-weight: 700; }
  .winImprove { font-size: 2.3vw; font-weight: 800; color: #2bb673; margin-top: 1vh; }
  .winGo { font-size: 1.7vw; color: #7d6740; margin-top: 1.4vh; }

  /* ===== Painted game interface (image mode) ===== */
  /* Fill the whole page with the illustration; overlays are positioned as a
     percentage of this same box, so they stay aligned to the painted art. */
  .gameStage { position: relative; width: 100vw; height: 100vh; }
  .gameStage .bg { display: block; width: 100vw; height: 100vh; object-fit: fill; }
  #gameRibbon, #mfb { display: none; }   /* mobile-only elements */
  #yako { display: none; }
  #hint { display: none; }
  #game.free-mode .gameStage { display: none; }
  #game.free-mode #hint { display: block; }

  .gameStage #starbar {
    position: absolute; left: 35%; top: 3.8%; width: 30.5%; height: 9.6%; transform: none;
    background: #a9772f; border: 3px solid #7c5520; border-radius: 999px; box-shadow: none;
    padding: 0; display: flex; align-items: center; justify-content: center; gap: 1.4%;
  }
  .gameStage .lvlStar { font-size: 5vh; }
  .gameStage #score {
    position: absolute; left: 84%; top: 3.2%; width: 13.5%; height: 10.4%; transform: none;
    display: flex; align-items: center; justify-content: center; font-size: 3vh;
    border-radius: 16px; border-width: 3px;
  }
  .gameStage #panel {
    position: absolute; inset: 0; width: 100%; height: 100%; transform: none;
    background: transparent; border: none; box-shadow: none; padding: 0; pointer-events: none;
  }
  .gameStage #panel::before, .gameStage #panel::after { content: none; }
  .gameStage #prompt {
    display: block; position: absolute; left: 27%; top: 23%; width: 50%; text-align: center;
    font-size: 2.7vh; font-weight: 700; color: #5b4327; text-shadow: 0 2px 2px rgba(255,255,255,.6);
    z-index: 9; transform: none;
  }
  .gameStage #target {
    position: absolute; left: 42%; top: 30%; width: 22%; height: 19%; right: auto; bottom: auto;
    min-height: 0; background: transparent; font-size: 14vh; font-weight: 800; overflow: visible;
    z-index: 9; text-shadow: 0 3px 0 #fff, 0 0 10px rgba(255,255,255,.85), 0 6px 14px rgba(0,0,0,.25);
  }
  .gameStage #target .itemRow { gap: 1vw; max-width: 100%; }
  .gameStage #target .glyph { font-size: 11vh; }
  .gameStage #target .bigletter { font-size: 14vh; }
  .gameStage #target .arrow { font-size: 5vh; }
  .gameStage #target .swatch { width: 10vh; height: 10vh; }
  .gameStage #keyboard {
    position: absolute; left: 20.5%; top: 55%; width: 57.5%; height: auto; bottom: auto; transform: none;
  }
  .gameStage #choices {
    position: absolute; left: 18%; top: 56%; width: 64%; bottom: auto;
  }
  /* light up the painted "Great job!" / "Oops!" cards based on the answer */
  #fbGood, #fbBad {
    display: none;   /* this background has no side cards; the reaction video shows feedback */
    position: absolute; border-radius: 18px; pointer-events: none; z-index: 7;
    background: rgba(18,22,48,.42);
    transition: background .25s ease, box-shadow .25s ease, transform .25s ease;
  }
  #fbGood { left: 78%; top: 15.5%; width: 19.5%; height: 25.5%; }
  #fbBad  { left: 78%; top: 43%;   width: 19.5%; height: 24%; }
  #fbGood.lit { background: rgba(255,255,255,0); box-shadow: 0 0 30px 8px rgba(255,210,70,.95), inset 0 0 24px rgba(255,235,150,.5);
    transform: scale(1.05); animation: cardPulse 1s ease-in-out infinite alternate; }
  #fbBad.lit  { background: rgba(255,255,255,0); box-shadow: 0 0 30px 8px rgba(120,180,255,.9), inset 0 0 24px rgba(180,215,255,.5);
    transform: scale(1.05); animation: cardPulse 1s ease-in-out infinite alternate; }
  @keyframes cardPulse { from { filter: brightness(1); } to { filter: brightness(1.12); } }

  /* animated reaction video that pops in on each answer */
  #reactionBox {
    position: fixed; left: 50%; top: 38%; transform: translate(-50%,-50%) scale(.55);
    width: 42vw; aspect-ratio: 16 / 9; border-radius: 22px; overflow: hidden; border: 6px solid var(--gold);
    box-shadow: 0 18px 50px rgba(0,0,0,.55); background: #000;
    z-index: 8; opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .32s cubic-bezier(.2,1.3,.4,1);
  }
  #reactionBox.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #reactionVid { display: block; width: 100%; height: 100%; object-fit: cover; }
  /* clean caption band that covers the video's baked-in text */
  #reactionCaption {
    position: absolute; left: 0; right: 0; bottom: 0; height: 27%;
    display: flex; align-items: center; justify-content: center; text-align: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 2.6vh; color: var(--blue);
    background: #f7eccb; border-top: 4px solid var(--gold); padding: 0 4%;
  }
  .gameStage .hotspot {
    position: absolute; background: transparent; border: 2px solid transparent; cursor: pointer;
    border-radius: 50%; padding: 0; box-shadow: none; color: transparent; font-size: 0;
  }
  .gameStage #logo  { left: 1%; top: 1.5%; width: 33%; height: 25%; border-radius: 14px; }
  .gameStage #exit  { left: 1%;  top: 86.5%; width: 9%; height: 12%; }
  .gameStage #sound { left: 90%; top: 86.5%; width: 9%; height: 12%; border-radius: 50%; transition: background .2s, box-shadow .2s; }
  /* blue (painted) = audio ON; red = muted */
  .gameStage #sound.muted { background: rgba(214,40,40,.74);
    box-shadow: inset 0 0 0 5px rgba(190,25,25,.95), 0 0 16px rgba(214,40,40,.6); }

  /* ===== MOBILE / portrait layout only — desktop is untouched ===== */
  @media (max-width: 760px) {
    /* travel dropdown: text-only on phones (thumbnails dropped to keep it compact) */
    #placePop button .pThumb { display: none; }

    /* scrollable column, no side character cluttering the frame */
    #start { align-items: flex-start; justify-content: flex-start; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .homeChar { display: none; }
    .homeUI { margin-left: 0; gap: 1.4vh; max-height: none; width: 100vw; padding: 2vh 0 22vh; box-sizing: border-box; }
    .homeTitle { font-size: 13vw; }
    .homeRibbon { font-size: 3.6vw; padding: .6vh 3.2vw; border-width: 2px; }
    .homeCard { width: 92vw; max-width: 92vw; box-sizing: border-box; padding: 2.4vh 4vw; gap: 1.6vh; border-width: 4px; }

    /* START + lesson chooser sized for phones */
    #startBtn { width: 100%; min-height: 14vh; border-radius: 22px; }
    #startBtn .title { font-size: 8.5vw; }
    #startBtn .sub { font-size: 3.6vw; }
    /* controls stack neatly: chooser on top, then language + narrator cards */
    .homeControls { flex-direction: column; align-items: stretch; width: 100%; gap: 1.2vh; }
    #chooseBtn { font-size: 4.6vw; padding: 1.4vh 6vw; width: 100%; box-sizing: border-box; }
    .ctrlGroup { width: 100%; box-sizing: border-box; padding: 1vh 2vw 1.2vh; }
    .ctrlLabel { font-size: 3vw; }
    .toggleRow { justify-content: center; gap: 2.4vw; }
    .toggleRow button { font-size: 7.5vw; padding: .6vh 1.6vw; border-radius: 14px; }

    /* win card sized for phones: everything fits, long content scrolls */
    .winCard { max-width: 92vw; max-height: 88vh; overflow-y: auto; padding: 2vh 4vw; box-sizing: border-box; }
    .winYako { width: 34vw; max-width: none; margin-top: 0; }
    .winTitle { font-size: 5.5vw; }
    .winStars { font-size: 8vw; }
    .winTime, .winBest, .winMist, .winImprove { font-size: 3.6vw; }
    .winVerdict { font-size: 4vw; max-width: 100%; }
    .winBtns { flex-direction: column; width: 100%; gap: 1.2vh; }
    .winBtn { font-size: 4.4vw; padding: 1.4vh 6vw; width: 100%; box-sizing: border-box; }

    /* name field: centered label over a full-width input */
    .homeCard .nameRow { flex-direction: column; gap: 1vh; width: 100%; font-size: 5vw; }
    .homeCard .nameRow label::before { content: "✦ "; color: var(--gold-d); }
    .homeCard .nameRow label::after  { content: " ✦"; color: var(--gold-d); }
    #start #nameInput { width: 100%; box-sizing: border-box; font-size: 6vw; text-align: center; padding: 1.6vh 4vw; border-radius: 14px; }

    /* one column of the 3-D buttons on phones */
    .btnGrid { grid-template-columns: 1fr; width: 92vw; max-width: 92vw; gap: 1.5vh; }
    #start .btnGrid .modeBtn { min-height: 12vh; padding: 1.6vh 4vw; border-radius: 20px; }
    #start .btnGrid .modeBtn .title { font-size: 6.6vw; margin-bottom: .4vh; }
    #start .btnGrid .modeBtn .sub   { font-size: 4vw; }
    #start .btnGrid .modeBtn .icons { font-size: 5.4vw; }
    #start .modeBtn[data-mode="both"] .title { font-size: 5.6vw; }
    #start .modeBtn[data-mode="free"] .sub   { font-size: 6vw; }
    /* lesson folders stay 2-column even on phones, so long labels need to shrink to fit the button */
    #start .modeBtn[data-mode="countlang"] .title,
    #start .modeBtn[data-mode="colormix"] .title { font-size: 5vw; }
    #start .modeBtn[data-mode="guesslang"] .title,
    #start .modeBtn[data-mode="samediff"] .title { font-size: 4.2vw; }
    #start .modeBtn[data-mode="pitchtrain"] .title,
    #start .modeBtn[data-mode="pitchlisten"] .title { font-size: 3.8vw; }
    #start .modeBtn[data-mode="numbers"] .title { font-size: 4.8vw; white-space: nowrap; }   /* "Numbers" on one line */

    .homeFoot { width: 92vw; max-width: 92vw; bottom: .8vh; gap: 2vw; padding: 1vh 2.4vw; white-space: normal; box-sizing: border-box; }
    .homeFoot .footIcon { flex: 0 0 auto; font-size: 5vw; }
    .homeFoot .footText { flex: 1 1 auto; min-width: 0; flex-direction: column; align-items: center; gap: .2vh; text-align: center; }
    .homeFoot .footText b  { font-size: 3.1vw; white-space: normal; max-width: 100%; }
    .homeFoot .footText em { font-size: 2.7vw; white-space: normal; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .homeFoot .footMusic { flex: 0 0 auto; gap: 1.6vw; }
    .homeFoot .mBtn  { width: 9vw; height: 9vw; font-size: 4.4vw; }

    /* ===================== MOBILE GAME VIEW (all modes except Free Play) ===================== */
    /* painted seaside video fills the screen; landscape interface PNG is hidden */
    #game .gameStage .bg { display: none; }
    #game:not(.free-mode) #freeBg { display: block; }
    #game #freeVignette { display: none; }
    #game:not(.free-mode) #reactionBox { display: none !important; }   /* the band gives feedback instead */
    #game.free-mode #gameRibbon, #game.free-mode #mfb { display: none; }

    /* stars (center) + score (right) as pills */
    #game #starbar { left: 4%; right: auto; top: 2.2%; width: auto; height: auto; transform: none;
      background: #fff6e0; border: 3px solid var(--gold); border-radius: 999px; padding: .7vh 3vw; gap: 1.4vw;
      box-shadow: 0 4px 10px rgba(60,45,15,.3); }
    #game #starbar .lvlStar { font-size: 3vh; }
    #game #score { left: auto; right: 4%; top: 2.2%; width: auto; height: auto; transform: none;
      background: var(--blue); color: #fff; border: 3px solid var(--blue-d); border-radius: 999px;
      padding: .7vh 4vw; font-size: 2.6vh; font-weight: 800; box-shadow: 0 4px 10px rgba(60,45,15,.3); }
    /* adv top bar: star bar + score stay pills; the location stacks name-over-thumbnail */
    #game.adv #starbar, #game.adv #score { top: 1.2vh; height: 8.4vw; box-shadow: 0 3px 8px rgba(60,45,15,.28); }
    #game.adv #placeTag { top: 1vh; left: 1.6vw; height: auto; max-width: 30vw; font-size: 3.1vw; gap: .3em;
      padding: .5vh .6em; box-shadow: 0 3px 8px rgba(60,45,15,.28); }
    #game.adv #placeTag .pThumb { width: 15vw; }
    #game.adv #starbar { padding: 0 2.4vw; gap: 1.4vw; }
    #game.adv #starbar .lvlStar { font-size: 4.4vw; }
    #game.adv #score { right: 1.6vw; padding: 0 3vw; font-size: 4vw; }

    /* ribbon */
    #gameRibbon { display: flex; align-items: center; justify-content: center; position: absolute;
      left: 50%; top: 9.4%; transform: translateX(-50%); white-space: nowrap; z-index: 9;
      background: #f6d9a8; border: 3px solid var(--gold); border-radius: 999px; padding: .6vh 4vw;
      font-family: 'Baloo 2'; font-weight: 700; color: #7a5a2e; font-size: 3.5vw;
      box-shadow: 0 4px 10px rgba(60,45,15,.3); }

    /* the big parchment card with seaside decorations */
    #game #panel { position: absolute; inset: auto; left: 5%; right: 5%; top: 14%; width: auto; height: 45%;
      background: linear-gradient(#f7e9c5, #efdcab); border: 7px solid var(--gold); border-radius: 28px;
      box-shadow: 0 12px 28px rgba(60,45,15,.4), inset 0 0 0 3px rgba(255,255,255,.5); overflow: hidden; }
    #game #panel::before { content: '🐚'; position: absolute; left: 5%; bottom: 4%; font-size: 13vw; opacity: .95; transform: rotate(-8deg); }
    #game #panel::after  { content: '🌿'; position: absolute; right: 6%; bottom: 4%; font-size: 13vw; opacity: .95; }
    #game #panel #prompt { position: absolute; left: 6%; right: 6%; top: 7%; width: auto; text-align: center;
      font-family: 'Baloo 2'; font-weight: 800; font-size: 6vw; line-height: 1.1; color: #5b4327;
      text-shadow: 0 2px 2px rgba(255,255,255,.6); z-index: 2; }
    #game #panel #target { position: absolute; left: 0; right: 0; top: 32%; bottom: 4%; width: 100%; height: auto;
      display: flex; align-items: center; justify-content: center; font-size: 30vw; z-index: 2; }
    #game #panel #target .bigletter { font-size: 30vw; }
    #game #panel #target .glyph { font-size: 24vw; }
    #game #panel #target .itemRow { gap: 3vw; }
    #game #panel #target .arrow { font-size: 9vw; }
    #game #panel #target .swatch { width: 22vw; height: 22vw; }
    #game #panel #target .spellRow { gap: 2vw; }
    #game #panel #target .spellRow .sl { font-size: 12vw; }
    #game #panel #target .spellPic { font-size: 15vw; }
    #game #panel #target .listenPic { font-size: 30vw; }
    #game.seq-mode #panel #prompt { font-size: 5.4vw; }

    /* keyboard: letters-only (or numbers-only) — no number row / modifier keys */
    #game #keyboard { position: absolute; left: 2.5%; right: 2.5%; top: auto; bottom: 15.5%; width: auto; transform: none;
      padding: 1.4vh 2vw; gap: 1vh; border-radius: 18px; }
    #game #keyboard .krow { gap: 1.4vw; }
    #game #keyboard .key { height: 6.2vh; font-size: 2.7vh; border-radius: 10px; }
    #game #keyboard .key.mod { display: none; }                                  /* hide Tab/Caps/Shift/etc. */
    #game #keyboard .krow:nth-child(5) { display: none; }                        /* the all-modifier row */
    #game:not(.num-answer) #keyboard .krow:nth-child(1) { display: none; }        /* hide digits for letter rounds */
    #game.num-answer #keyboard .krow:nth-child(2),
    #game.num-answer #keyboard .krow:nth-child(3),
    #game.num-answer #keyboard .krow:nth-child(4) { display: none; }              /* hide letters for number rounds */

    /* number/category choice chips sit just above the band */
    #game #choices { position: absolute; top: auto; bottom: 16%; height: auto; left: 2%; width: 96%; gap: 3vw; }
    /* bigger flags/labels so little fingers can tap on a phone */
    .choice .flagBig { font-size: 12vw; } .choice .sdBig { font-size: 11vw; }
    .choice .nm { font-size: 3.4vw; } .choice .num { font-size: 5vw; }
    .choice .clusterChoice { max-width: 26vw; font-size: 5vw; }
    .listenObj, .listenObj .glyph, .listenObj .bigGlobe, .listenObj .bigEar, .listenObj .bigCount { font-size: 22vw; }
    .listenObj .swatch { width: 22vw; height: 22vw; }
    .speakerBtn { width: 20vw; height: 20vw; font-size: 10vw; }

    /* bottom feedback / hint band */
    #mfb { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      position: absolute; left: 14%; right: 14%; bottom: 1.6%; z-index: 9; min-height: 8vh; padding: 1vh 3vw;
      background: linear-gradient(#f7e4b4, #e7c884); border: 4px solid var(--gold); border-radius: 22px;
      box-shadow: 0 6px 16px rgba(60,45,15,.32), inset 0 0 0 3px rgba(255,255,255,.45);
      font-family: 'Baloo 2'; color: #6e4f24; line-height: 1.1; }
    #mfb::before { content: '🎈'; position: absolute; left: 4%; bottom: 12%; font-size: 6.5vw; }
    #mfb::after  { content: '🎈'; position: absolute; right: 4%; bottom: 12%; font-size: 6.5vw; }
    #mfb b { font-weight: 800; font-size: 4.6vw; }
    #mfb span { display: block; font-size: 3.4vw; color: #6e4f24; }
    #mfb b.hintline { color: #6e4f24; font-size: 4.2vw; }
    #mfb.good b { color: var(--blue); }
    #mfb.bad b  { color: #c0392b; }

    /* round home + sound buttons in the bottom corners */
    #game #exit, #game #sound { position: absolute; bottom: 1.8%; top: auto; width: 13vw; height: 13vw; min-width: 0;
      border-radius: 50%; background: var(--blue); border: 3px solid var(--blue-d);
      box-shadow: 0 5px 12px rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 6vw; z-index: 11; }
    #game #exit  { left: 3%;  right: auto; }
    #game #sound { right: 3%; left: auto; }
    #game #exit::after  { content: '🏠'; }
    #game #sound::after { content: '🔊'; }
    #game #sound.muted { background: #c0392b; border-color: #9a261a; box-shadow: 0 5px 12px rgba(0,0,0,.4); }
    #game #sound.muted::after { content: '🔇'; }

    /* keep the celebratory popups from cluttering the small screen */
    #game #buddy { display: none; }
  }
</style>
